ar o útero para a esquerda e levemente para cima. Reduz compressão da veia cava em até 80%. Manter durante toda a RCP."},{titulo:"Cesariana perimortem",subtitulo:"Decisão médica — comunicar regulação",texto:"Se PCR >4 minutos sem RCES, a cesariana de emergência pode aumentar a chance de RCES materno ao aliviar a compressão da veia cava. Decisão exclusivamente médica."}]},{tipo:"destaque",texto:"A melhor chance de sobrevida do feto é a recuperação da mãe. RCP de alta qualidade na gestante é a prioridade máxima — não existe RCP 'separada' para o feto no APH."}]}},{id:"20.5",titulo:"Trauma em gestante",conteudo:{tipo:"texto",intro:"O trauma é a principal causa de morte não obstétrica em gestantes. O útero aumentado modifica tanto o mecanismo de lesão quanto a apresentação clínica.",blocos:[{tipo:"card-grid",cards:[{titulo:"Mecanismo de lesão específico",subtitulo:"Útero como alvo",texto:"O útero gravídico é vulnerável a trauma direto — contusão, perfuração, descolamento de placenta. Cinto de segurança mal posicionado (sobre o abdome) pode causar lesão uterina mesmo em impactos leves."},{titulo:"Trauma penetrante",subtitulo:"Útero protege vísceras abdominais",texto:"O útero gravídico 'empurra' as vísceras para cima — lesão de intestino e fígado é menos comum. Porém o feto está exposto. Transporte urgente para hospital com cirurgia e obstetrícia."},{titulo:"Cinto de segurança na gestante",subtitulo:"Posicionamento correto",texto:"Cinto abdominal: abaixo do abdome, sobre as espinhas ilíacas. Cinto diagonal: entre as mamas, sobre o ombro. NUNCA sobre o abdome. Airbag: manter ativado — benefício supera o risco."},{titulo:"Avaliação fetal no APH",subtitulo:"O que é possível verificar",texto:"Batimentos cardíacos fetais (se estetoscópio disponível): normal 110-160 bpm. Movimentos fetais relatados pela mãe. Sangramento vaginal. Contrações regulares. Todas essas informações devem ser reportadas à regulação."}]},{tipo:"destaque",texto:"Todo trauma em gestante, mesmo de baixa energia aparente, deve ser avaliado em hospital com monitorização fetal por pelo menos 4-6 horas. Descolamento de placenta pode ocorrer horas após o trauma sem sintomas imediatos."}]}}]},{id:21,titulo:"Lei Lucas e APH em Ambiente Escolar",icone:"🏫",status:"disponivel",topicos:[{id:"21.1",titulo:"A Lei Lucas — Lei nº 13.722/2018",conteudo:{tipo:"texto",intro:"A Lei Lucas, sancionada em 04 de outubro de 2018, transformou a forma como as escolas brasileiras devem lidar com emergências. Ela tem esse nome em homenagem a Lucas Begalli, criança que morreu engasgada em uma escola de Campinas em 2017.",blocos:[{tipo:"destaque",texto:"LEI Nº 13.722/2018 — Torna obrigatória a capacitação em noções básicas de primeiros socorros de professores e funcionários de estabelecimentos de ensino públicos e privados de educação básica e de estabelecimentos de recreação infantil."},{tipo:"card-grid",cards:[{titulo:"O que a lei exige",subtitulo:"Obrigações legais",texto:"Capacitação de TODOS os professores e funcionários das escolas em: manobra de Heimlich, RCP básica e primeiros socorros gerais. A lei é válida para escolas públicas e privadas de educação básica (creche ao ensino médio)."},{titulo:"Quem deve ser capacitado",subtitulo:"Abrangência da lei",texto:"Professores, auxiliares, merendeiras, porteiros, secretários, monitores, zeladores — qualquer funcionário que tenha contato com estudantes. Sem exceções."},{titulo:"Periodicidade",subtitulo:"Reciclagem obrigatória",texto:"A lei não define prazo de reciclagem, mas o Ministério da Saúde recomenda capacitação anual. As escolas devem manter registro das capacitações realizadas."},{titulo:"Responsabilidade",subtitulo:"Em caso de omissão",texto:"A escola que não capacitar seus funcionários e tiver um caso de morte ou lesão grave por falta de primeiros socorros pode responder civil e penalmente. A lei cria obrigação de resultado, não apenas de boa vontade."}]},{tipo:"lista",titulo:"Conteúdo mínimo da capacitação segundo a Lei Lucas:",itens:["Manobra de Heimlich — desobstrução de via aérea por corpo estranho em crianças, adultos e lactentes","RCP básica — reconhecimento de PCR e compressões torácicas","Reconhecimento de emergências pediátricas comuns no ambiente escolar","Quando e como acionar o socorro (SAMU 192, Bombeiros 193)","Posição de recuperação e cuidados básicos até chegada do socorro"]}]}},{id:"21.2",titulo:"OVACE na criança — Manobra de Heimlich escolar",conteudo:{tipo:"texto",intro:"O engasgo é a principal emergência prevista na Lei Lucas. Crianças engasgam com frequência — alimentos, objetos pequenos, brinquedos. A resposta nos primeiros segundos é decisiva.",blocos:[{tipo:"card-grid",cards:[{titulo:"Lactente (<1 ano)",subtitulo:"Técnica específica — NUNCA Heimlich",texto:"5 golpes interescapulares nas costas com a criança em decúbito ventral no antebraço + 5 compressões torácicas em decúbito dorsal. Alternar até desobstrução. NUNCA fazer compressão abdominal em lactente."},{titulo:"Criança consciente (>1 ano)",subtitulo:"Heimlich adaptado",texto:"Ajoelhar atrás da criança. Punho entre umbigo e esterno. Compressões para dentro e para cima. Repetir até desobstrução ou perda de consciência. Menos força que no adulto."},{titulo:"Criança inconsciente",subtitulo:"Iniciar RCP",texto:"Deitar no chão. Iniciar RCP 30:2. Antes de cada ventilação: abrir a boca e verificar se o objeto está visível. Remover SOMENTE se visível. Nunca varredura cega."},{titulo:"Quando chamar o SAMU",subtitulo:"Sempre",texto:"Em qualquer episódio de OVACE em criança, acionar o SAMU (192) imediatamente — mesmo que resolva antes da chegada. A criança deve ser avaliada no hospital."}]},{tipo:"destaque",texto:"Na escola: uma pessoa aciona o SAMU (192) enquanto outra realiza a manobra. Não perca tempo tentando resolver sozinho — delegue o chamado desde o início."}]}},{id:"21.3",titulo:"O APH atendendo ocorrência em ambiente escolar",conteudo:{tipo:"texto",intro:"Quando o SAMU chega a uma escola, a cena tem características específicas que o socorrista precisa considerar. O ambiente escolar tem seus próprios riscos, atores e dinâmicas.",blocos:[{tipo:"lista",titulo:"Particularidades do atendimento em escola:",itens:["Vítima frequentemente é criança ou adolescente — escalas e parâmetros pediátricos","Presença de múltiplos adultos (professores) em estado emocional alterado — designar um responsável para interlocução","Curiosos e outras crianças ao redor — solicitar afastamento imediato para garantir privacidade e segurança","Pais podem chegar antes do término do atendimento — preparar a equipe para esse cenário","Obrigatoriedade de notificação: acidentes com menores em escola são de notificação ao Conselho Tutelar e órgãos responsáveis","Documentar com precisão: nome completo, idade, responsável contatado, escola, testemunhas"]},{tipo:"card-grid",cards:[{titulo:"Comunicação com professores",subtitulo:"Eles são parte da cena",texto:"O professor que atendeu primeiro é sua fonte de informação: o que aconteceu, há quanto tempo, o que foi feito. Ouvi-lo rapidamente antes de examinar a criança economiza tempo e melhora a avaliação."},{titulo:"Contato com responsável",subtitulo:"Obrigação legal",texto:"A escola deve contatar os responsáveis imediatamente. O socorrista deve perguntar se já foram acionados. Se a criança precisar ser transportada sem responsável presente: registrar na ficha e comunicar à regulação."},{titulo:"Crianças como testemunhas",subtitulo:"Cuidado com o impacto emocional",texto:"Outras crianças que presenciaram o acidente podem estar em estado de choque emocional. Solicitar à escola que ofereça suporte psicológico. Não realizar o atendimento em frente a outras crianças."},{titulo:"Acidente x Suspeita de maus-tratos",subtitulo:"Atenção ao mecanismo",texto:"Se o mecanismo de lesão não condiz com o relato ou se há lesões em diferentes estágios de cicatrização: suspeitar de maus-tratos. Registrar objetivamente e comunicar à regulação e ao Conselho Tutelar."}]}]}},{id:"21.4",titulo:"Emergências mais comuns em ambiente escolar",conteudo:{tipo:"texto",intro:"Além do engasgo, o socorrista encontrará outras situações frequentes em escolas. Conhecer o perfil dessas ocorrências agiliza o atendimento.",blocos:[{tipo:"card-grid",cards:[{titulo:"Trauma por queda",subtitulo:"Mais comum em educação infantil",texto:"Queda de equipamento de playground, escada, cadeira. Avaliar TCE (perda de consciência, vômito, sonolência), fraturas e lesão cervical em quedas de altura. Imobilizar conforme mecanismo."},{titulo:"Convulsão febril",subtitulo:"Crianças de 6 meses a 5 anos",texto:"Proteger de lesões, posição lateral após a crise, O2, não colocar nada na boca. Verificar temperatura. Crise única e breve geralmente benigna, mas exige avaliação médica. Comunicar regulação."},{titulo:"Reação alérgica / Anafilaxia",subtitulo:"Alimentos, abelhas, medicamentos",texto:"Perguntar se a criança tem alergia conhecida e se usa adrenalina auto-injetável. Sinais de anafilaxia: urticária + dispneia + hipotensão. Adrenalina IM imediatamente. Transporte urgente."},{titulo:"Crise epiléptica",subtitulo:"Epilepsia conhecida",texto:"Muitas crianças com epilepsia têm protocolo de emergência na escola. Solicitar o plano de ação da criança ao responsável. Proteger, cronometrar, posição lateral pós-crise. SAMU se >5 min ou primeira crise."}]},{tipo:"lista",titulo:"Informações a coletar SEMPRE em ocorrência com criança na escola:",itens:["Nome completo e data de nascimento da criança","Nome e contato dos responsáveis (já acionados?)","Professora/responsável que acompanhou o incidente","O que aconteceu, quando e o que foi feito antes da chegada do SAMU","Histórico de saúde relevante: alergias, uso de medicamentos, condições crônicas","Plano de ação individual de emergência (se existir para aquela criança)"]}]}},{id:"21.5",titulo:"Prevenção e preparação — papel do APH na escola",conteudo:{tipo:"texto",intro:"O socorrista não é apenas quem atende a emergência — é também um agente de prevenção e educação. A Lei Lucas abre oportunidades para o APH atuar preventivamente nas escolas.",blocos:[{tipo:"card-grid",cards:[{titulo:"Treinamento nas escolas",subtitulo:"Socorrista como educador",texto:"O profissional de APH pode e deve participar das capacitações previstas na Lei Lucas. Treinar professores em Heimlich e RCP básica multiplica o alcance do socorro nos primeiros minutos."},{titulo:"Programa Saúde na Escola (PSE)",subtitulo:"Parceria ESF e escola",texto:"As equipes de Atenção Primária podem integrar ações de primeiros socorros no PSE. Capacitar funcionários, realizar simulados e criar protocolos de emergência são ações previstas no programa."},{titulo:"Kit de emergência escolar",subtitulo:"O que a escola deve ter",texto:"DEA (em escolas com mais de 500 alunos é recomendado), kit de primeiros socorros, plano de emergência afixado em local visível, lista atualizada de alunos com condições especiais e contatos de emergência."},{titulo:"Simulados de emergência",subtitulo:"Prática salva vidas",texto:"A lei encoraja a realização de simulados periódicos. O socorrista pode apoiar a escola na criação de cenários realistas, avaliação de resposta e identificação de pontos de melhoria."}]},{tipo:"destaque",texto:"A Lei Lucas não criou apenas uma obrigação — criou uma oportunidade. Escolas preparadas salvam mais vidas. O socorrista que capacita professores multiplica sua capacidade de salvar vidas muito além do alcance de uma ambulância."}]}}]}];function Om({bloco:e}){return e.tipo==="destaque"?l.jsx("div",{style:{background:"#fff5f5",border:"2px solid #e53e3e",borderRadius:10,padding:"14px 18px",marginBottom:18,color:"#c53030",fontWeight:700,fontSize:13,lineHeight:1.6},children:e.texto}):e.tipo==="paragrafo"?l.jsx("p",{style:{color:"#4a5568",lineHeight:1.8,marginBottom:16,fontSize:14,margin:"0 0 16px 0"},children:e.texto}):e.tipo==="lista"?l.jsxs("div",{style:{marginBottom:18},children:[e.titulo&&l.jsx("div",{style:{fontWeight:700,color:"#2d3748",marginBottom:10,fo
