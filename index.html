 para verificação de pulso",subtitulo:"Máximo 10 segundos",texto:"Verificação de pulso por mais de 10 segundos é inaceitável. Se incerto: iniciar RCP. Melhor iniciar RCP desnecessária do que atrasar em PCR real."},{titulo:"DEA em lactentes",subtitulo:"Nova recomendação",texto:"DEA com pás pediátricas pode ser usado em lactentes (<1 ano) quando não houver desfibrilador manual disponível."}]}]}},{id:"10.2",titulo:"RCP em situações especiais — AHA 2025",conteudo:{tipo:"texto",intro:"A AHA 2025 detalhou protocolos para situações especiais de PCR que diferem do padrão adulto.",blocos:[{tipo:"card-grid",cards:[{titulo:"Afogamento",subtitulo:"5 ventilações antes das compressões",texto:"PCR por afogamento é hipóxica. Iniciar com 5 ventilações de resgate antes das compressões torácicas — diferente do padrão adulto."},{titulo:"PCR por overdose de opioides",subtitulo:"Naloxona + RCP",texto:"Administrar naloxona (IM ou intranasal) enquanto realiza RCP. Não substituir RCP pela naloxona — manter ambas simultaneamente."},{titulo:"PCR em gestante",subtitulo:"Deslocamento uterino manual",texto:"Deslocar o útero manualmente para a esquerda durante as compressões. Se PCR >4 min sem RCES: considerar cesariana de emergência (5 min para bebê)."},{titulo:"Hipotermia grave",subtitulo:"RCP contínua até reaquecimento",texto:"'Não está morto até estar quente e morto.' Manter RCP em hipotermia grave (<30°C) até reaquecimento em ambiente hospitalar."}]},{tipo:"destaque",texto:"AHA 2025 reforça: em OVACE com PCR, verificar a boca antes de cada tentativa de ventilação e remover o objeto SOMENTE se visível. Varredura digital cega está ABOLIDA."}]}},{id:"10.3",titulo:"Cuidados pós-PCR — AHA 2025",conteudo:{tipo:"texto",intro:"O retorno da circulação espontânea (RCES) não é o fim do tratamento — é o início de uma fase crítica. A AHA 2025 enfatiza os cuidados pós-PCR como um protocolo estruturado.",blocos:[{tipo:"card-grid",cards:[{titulo:"Controle Direcionado da Temperatura (CDT)",subtitulo:"Neuroproteção",texto:"Manter temperatura corporal entre 32–36°C por 24h após RCES em pacientes comatosos. Previne lesão neurológica secundária."},{titulo:"Normóxia após RCES",subtitulo:"SpO2 alvo 94–98%",texto:"Evitar hiperóxia após RCES — O2 a 100% pós-retorno pode causar lesão por radicais livres. Titular O2 para SpO2 94–98%."},{titulo:"Normocapnia",subtitulo:"EtCO2 alvo 35–45 mmHg",texto:"Hipocapnia (hiperventilação) causa vasoconstrição cerebral. Hipercapnia piora edema cerebral. Manter ventilação controlada."},{titulo:"Hemodinâmica pós-RCES",subtitulo:"PA alvo ≥90 mmHg sistólica",texto:"Hipotensão pós-RCES piora o prognóstico neurológico. Administrar vasopressores conforme protocolo se necessário."}]},{tipo:"lista",titulo:"O que fazer imediatamente após o RCES no APH:",itens:["Verificar SpO2 e titular O2 para 94–98%","Verificar frequência e profundidade da ventilação — evitar hiper e hipoventilar","Monitorizar PA: se sistólica <90 mmHg → reposição volêmica e comunicar regulação","Verificar glicemia: hipoglicemia e hiperglicemia grave pioram o prognóstico neurológico","Registrar o horário do RCES","Comunicar ao hospital receptor: tempo de PCR, ciclos de RCP, medicamentos, RCES"]}]}},{id:"10.4",titulo:"Cadeia de sobrevivência atualizada — AHA 2025",conteudo:{tipo:"texto",intro:"A AHA 2025 revisou a cadeia de sobrevivência para enfatizar a continuidade do cuidado desde o reconhecimento até a recuperação.",blocos:[{tipo:"cadeia",elos:[{numero:1,titulo:"Vigilância e prevenção",icone:"🔍",cor:"#e53e3e",descricao:"NOVO: identificar pacientes em risco antes da PCR — monitorização hospitalar e educação da população."},{numero:2,titulo:"Reconhecimento e acionamento",icone:"📞",cor:"#dd6b20",descricao:"Reconhecer PCR em até 10 segundos e acionar o socorro imediatamente (192/193)."},{numero:3,titulo:"RCP de alta qualidade",icone:"🤲",cor:"#d69e2e",descricao:"Compressões imediatas, fortes, rápidas, com retorno completo e mínimo de pausas."},{numero:4,titulo:"Desfibrilação precoce",icone:"⚡",cor:"#38a169",descricao:"DEA o mais rápido possível. Cada minuto sem desfibrilação em FV reduz a sobrevida em 7–10%."},{numero:5,titulo:"Suporte avançado de vida",icone:"🏥",cor:"#3182ce",descricao:"Equipe médica com drogas, via aérea avançada e monitorização."},{numero:6,titulo:"Recuperação",icone:"💚",cor:"#805ad5",descricao:"NOVO elo: reabilitação física, neurológica e psicológica pós-PCR. Suporte ao sobrevivente e à família."}]},{tipo:"destaque",texto:"Novidade AHA 2025: 'Vigilância e Prevenção' e 'Recuperação' são os novos elos que expandem a cadeia para além da ressuscitação aguda."}]}},{id:"10.5",titulo:"Pediatria — atualizações AHA 2025",conteudo:{tipo:"texto",intro:"As diretrizes pediátricas de 2025 trazem refinamentos importantes para RCP em crianças e lactentes.",blocos:[{tipo:"card-grid",cards:[{titulo:"Compressões em lactente",subtitulo:"2 socorristas: técnica dos 2 polegares",texto:"Com 2 socorristas: mãos circundando o tórax, 2 polegares no centro. Mais eficaz que 2 dedos. Com 1 socorrista: 2 dedos."},{titulo:"Profundidade em crianças",subtitulo:"1/3 do diâmetro AP do tórax",texto:"Criança: aproximadamente 5 cm. Lactente: aproximadamente 4 cm. Não usar valores absolutos — proporcional ao tamanho."},{titulo:"Relação C:V pediátrica",subtitulo:"1 socorrista: 30:2 / 2 socorristas: 15:2",texto:"Com 2 profissionais de saúde atendendo criança: 15:2 (mais ventilações). Com 1 socorrista ou leigo: 30:2."},{titulo:"DEA em lactentes",subtitulo:"Atualização 2025",texto:"DEA com pás pediátricas é aceitável em lactentes (<1 ano) quando desfibrilador manual não estiver disponível. Antes era contraindicado."}]},{tipo:"destaque",texto:"Em PCR pediátrica: a causa mais frequente é RESPIRATÓRIA — não cardíaca. Por isso as ventilações têm mais peso na RCP pediátrica do que na do adulto. Nunca negligenciar a via aérea."}]}}]},{id:11,titulo:"Via Aérea, Ventilação e Desobstrução",icone:"🫁",status:"disponivel",topicos:[{id:"11.1",titulo:"Anatomia da via aérea",conteudo:{tipo:"texto",intro:"Conhecer a anatomia da via aérea é fundamental para identificar obstruções e escolher a técnica adequada de abertura e manutenção.",blocos:[{tipo:"lista",titulo:"Via aérea superior:",itens:["Nariz e boca: porta de entrada do ar","Faringe (oro, naso e laringofaringe): compartimento comum para ar e alimento","Laringe: estrutura cartilaginosa que protege a traqueia. Contém as cordas vocais.","Epiglote: válvula que fecha a traqueia durante a deglutição"]},{tipo:"lista",titulo:"Via aérea inferior:",itens:["Traqueia: conduz o ar até os pulmões","Brônquios principais: direito (mais vertical — corpo estranho entra mais facilmente) e esquerdo","Brônquios lobares e segmentares","Alvéolos: local da troca gasosa"]},{tipo:"destaque",texto:"Obstrução de via aérea superior é causa imediata de morte. A identificação e resolução rápida são a prioridade máxima no ABCDE."}]}},{id:"11.2",titulo:"Abertura e manutenção da via aérea",conteudo:{tipo:"texto",intro:"Em vítimas inconscientes, a língua é a principal causa de obstrução da via aérea. As manobras de abertura devem ser dominadas por todo socorrista.",blocos:[{tipo:"card-grid",cards:[{titulo:"Hiperextensão + queixo",subtitulo:"Sem suspeita de trauma",texto:"Uma mão na testa, dedos sob o queixo. Estende a cabeça e eleva o queixo. Simples e eficaz."},{titulo:"Tração mandibular",subtitulo:"Com suspeita de trauma cervical",texto:"Dedos nas bordas da mandíbula, tracionar anteriormente sem mover a coluna cervical."},{titulo:"Cânula Orofaríngea (Guedel)",subtitulo:"Vítima inconsciente sem reflexo de gag",texto:"Impede que a língua obstrua a faringe. Medir do lóbulo da orelha até a comissura labial."},{titulo:"Cânula Nasofaríngea",subtitulo:"Vítima semi-consciente ou com trauma oral",texto:"Tolerada por vítimas com algum nível de consciência. Contraindicada em fraturas de base do crânio."}]},{tipo:"destaque",texto:"Nunca use cânula orofaríngea em vítima consciente ou com reflexo de gag presente — pode causar vômito e broncoaspiração."}]}},{id:"11.3",titulo:"Obstrução por corpo estranho",conteudo:{tipo:"texto",intro:"A obstrução de via aérea por corpo estranho (OVACE) pode ser parcial ou total, e o tratamento depende da gravidade e do nível de consciência.",blocos:[{tipo:"card-grid",cards:[{titulo:"Obstrução parcial",subtitulo:"Tosse eficaz",texto:"Estimular a vítima a continuar tossindo. NÃO interfira — a tosse é o melhor mecanismo de desobstrução."},{titulo:"Obstrução total — Consciente",subtitulo:"Manobra de Heimlich",texto:"Posicionar-se atrás da vítima. Punho fechado entre umbigo e esterno. Compressões abdominais rápidas para dentro e para cima."},{titulo:"Obstrução total — Inconsciente",subtitulo:"PCR por OVACE",texto:"Deitar a vítima. Iniciar RCP. Antes de cada ventilação, verificar a boca. Se visualizar o objeto: remover."},{titulo:"Lactente com OVACE",subtitulo:"Técnica específica",texto:"5 golpes nas costas + 5 compressões torácicas. Alternados até desobstrução ou inconsciência."}]},{tipo:"destaque",texto:"Nunca faça varredura às cegas com o dedo na boca da vítima. Remova o objeto apenas se estiver visível."}]}},{id:"11.4",titulo:"Ventilação com dispositivos",conteudo:{tipo:"texto",intro:"A ventilação assistida é indicada quando a vítima não respira adequadamente ou está em apneia. Os dispositivos disponíveis no APH variam conforme o nível de complexidade.",blocos:[{tipo:"card-grid",cards:[{titulo:"Bolsa-Valva-Máscara (BVM)",subtitulo:"Dispositivo principal no APH básico",texto:"Volume: 500–600 mL (adulto). Frequência: 10–12/min. Observar elevação do tórax. Requere treinamento para boa vedação."},{titulo:"Máscara de bolso (pocket mask)",subtitulo:"Ventilação boca-máscara",texto:"Barreira protetora entre socorrista e vítima. Permite maior volume e menor fadiga que a BVM sozinha."},{titulo:"Oxigênio suplementar",subtitulo:"Quando oferecer",texto:"SpO2 <94%: cateter nasal 2–4 L/min. SpO2 <90%: máscara facial 8–12 L/min. PCR: O2 100% sempre."},{titulo:"Dispositivos supraglóticos",subtitulo:"Máscara laríngea e correlatos",texto:"Inserção mais simples que IOT. Não protege 100% contra aspiração mas é alternativa eficaz no APH."}]},{tipo:"destaque",texto:"Hiperventilar é tão perigoso quanto hipoventilar. Volume excessivo aumenta pressão intratorácica, reduz retorno venoso e pode distender o estômago (risco de vômito e aspiração)."}]}},{id:"11.5",titulo:"Pneumotórax e hemotórax",conteudo:{tipo:"texto",intro:"Lesões torácicas com comprometimento respiratório exigem reconhecimento rápido no APH. Pneumotórax hipertensivo e hemotórax maciço são emergências com risco de morte imediato.",blocos:[{tipo:"card-grid",cards:[{titulo:"Pneumotórax simples",subtitulo:"Ar no espaço pleural",texto:"Dor torácica, dispneia, murmúrio vesicular reduzido unilateralmente. Tratamento definitivo: drenagem."},{titulo:"Pneumotórax hipertensivo",subtitulo:"Emergência imediata",texto:"Desvio de traqueia CONTRALATERAL, hipotensão, estase jugular, ausência de MV, cianose. Descompressão de emergência."},{titulo:"Pneumotórax aberto",subtitulo:"Ferida torácica aspirante",texto:"Curativo de três lados (oclusivo em três lados, aberto em um para escape de ar)."},{titulo:"Hemotórax maciço",subtitulo:"Sangue na cavidade pleural",texto:">1500 mL de sangue. Hipotensão + ausência de MV + macicez à percussão. Drenagem e reposição volêmica."}]},{tipo:"destaque",texto:"Pneumotórax hipertensivo = emergência que mata em minutos. Reconhecer clinicamente — não espere confirmação radiológica para descomprimir."}]}},{id:"11.6",titulo:"OVACE — conceito e reconhecimento",conteudo:{tipo:"texto",intro:"A Obstrução de Via Aérea por Corpo Estranho (OVACE) é uma das emergências mais dramáticas e tratáveis do APH. O reconhecimento imediato e a intervenção correta salvam vidas.",blocos:[{tipo:"card-grid",cards:[{titulo:"Obstrução parcial",subtitulo:"Via aérea ainda funcional",texto:"Tosse eficaz, consegue falar, estridor leve. CONDUTA: estimular a tosse. Não intervir com manobras externas."},{titulo:"Obstrução total",subtitulo:"Via aérea comprometida",texto:"Sinal universal (mãos no pescoço), incapaz de falar ou tossir, cianose progressiva, agitação. CONDUTA: intervenção imediata."},{titulo:"Vítima inconsciente",subtitulo:"Colapso por OVACE",texto:"Inconsciência, apneia, cianose. Deitar, iniciar RCP, verificar boca antes de cada ventilação."},{titulo:"Causas mais frequentes",subtitulo:"Por faixa etária",texto:"Adultos: alimentos (carne, pão). Crianças: objetos pequenos, balas, brinquedos. Idosos: disfagia neurológica."}]},{tipo:"destaque",texto:"Sinal universal de engasgo: mãos no pescoço com expressão de angústia. Reconheça imediatamente — cada segundo importa na OVACE total."}]}},{id:"11.7",titulo:"Manobras em adultos e crianças — AHA 2020 atualizado",conteudo:{tipo:"texto",intro:"As diretrizes mais recentes da American Heart Association (AHA 2020) e da ILCOR mantêm as manobras clássicas com refinamentos importantes baseados em evidências.",blocos:[{tipo:"lista",titulo:"Adulto consciente com OVACE grave:",itens:["1. Confirmar obstrução: 'Você está engasgado?' Se não consegue responder: agir","2. Posicionar-se ao lado e levemente atrás da vítima","3. 5 golpes interescapulares (nas costas) com a base da mão — firmes e secos","4. 5 compressões abdominais (Heimlich): punho entre umbigo e esterno, outra mão por cima, para dentro e para cima","5. Alternar 5 golpes + 5 Heimlich até desobstrução ou perda de consciência"]},{tipo:"card-grid",cards:[{titulo:"Criança >1 ano",subtitulo:"Mesma sequência do adulto adaptada",texto:"Golpes nas costas + compressões abdominais com menos força. Ajoelhar ou agachar para ficar na altura da criança."},{titulo:"Lactente <1 ano",subtitulo:"Técnica diferente — NUNCA Heimlich",texto:"5 golpes interescapulares em decúbito ventral no antebraço + 5 compressões torácicas em decúbito dorsal. Alternar até desobstrução."},{titulo:"Grávida ou obesa",subtitulo:"Compressões torácicas no lugar do Heimlich",texto:"Ponto de aplicação: metade inferior do esterno. Mesma força das compressões de RCP. Não comprimir o abdome."},{titulo:"Vítima solitária que engasga",subtitulo:"Auto-Heimlich",texto:"Fazer compressão abdominal com as próprias mãos ou jogar o abdome contra uma superfície firme (borda de cadeira, mesa)."}]},{tipo:"destaque",texto:"AHA 2020: a combinação de golpes nas costas + compressões abdominais é mais eficaz que usar apenas uma técnica isolada. Alterne sempre as duas."}]}},{id:"11.8",titulo:"OVACE em vítima inconsciente",conteudo:{tipo:"texto",intro:"Quando a vítima com OVACE perde a consciência, a abordagem muda completamente. A RCP passa a ser o protocolo central, com adaptações específicas.",blocos:[{tipo:"lista",titulo:"Sequência para OVACE com colapso — AHA 2020:",itens:["1. Deitar a vítima com segurança no chão","2. Acionar o socorro (192 ou 193) ou solicitar que alguém acione","3. Iniciar compressões torácicas — o aumento de pressão intratorácica pode expelir o objeto","4. ANTES de cada tentativa de ventilação: abrir a boca e verificar se o objeto está visível","5. Se visível: remover com o dedo — NUNCA fazer varredura cega","6. Tentar 2 ventilações — se não entrar ar, continuar as compressões","7. Repetir o ciclo até desobstrução ou chegada do SAV"]},{tipo:"destaque",texto:"Varredura digital CEGA está ABOLIDA das diretrizes. Remove o objeto APENAS se estiver VISÍVEL na boca aberta. Varredura cega pode empurrar o objeto para mais fundo."},{tipo:"card-grid",cards:[{titulo:"Laringoscopia na cena",subtitulo:"APH avançado",texto:"Equipes com médico ou enfermeiro especializado podem usar laringoscópio + pinça de Magill para remoção sob visão direta. Técnica mais eficaz disponível."},{titulo:"Cricotireotomia de emergência",subtitulo:"Último recurso — OVACE intransponível",texto:"Acesso à via aérea abaixo da obstrução. Técnica médica ou de enfermagem avançada. Indicada quando todas as outras manobras falharam e a vítima está em hipóxia grave."}]}]}},{id:"11.9",titulo:"Situações especiais de OVACE",conteudo:{tipo:"texto",intro:"Algumas populações e contextos exigem adaptações técnicas ou raciocínio diferenciado no manejo da OVACE.",blocos:[{tipo:"card-grid",cards:[{titulo:"OVACE em idosos",subtitulo:"Maior fragilidade óssea",texto:"Risco de fratura de costelas com Heimlich/compressões. Manter a técnica, mas comunicar ao serviço receptor. A obstrução é mais grave que a lesão potencial."},{titulo:"OVACE em traqueostomizados",subtitulo:"Via aérea artificial",texto:"Obstrução pode ocorrer na cânula. Tentar aspirar. Se não resolver: remover a cânula e ventilar pela abertura da traqueostomia com máscara adaptada."},{titulo:"OVACE por prótese dentária",subtitulo:"Adultos e idosos",texto:"Prótese solta pode deslocar e obstruir. Se visível e acessível: remover manualmente. Não tentar remover às cegas."},{titulo:"OVACE em vítima de PCR prévia",subtitulo:"Diagnóstico diferencial",texto:"Vítima em PCR que não ventila apesar de via aérea aberta: suspeitar de OVACE. Verificar a boca antes de cada ventilação no ciclo de RCP."}]},{tipo:"destaque",texto:"Em crianças: a maioria das OVACE é por objetos sólidos (brinquedos, moedas, alimentos duros). Prevenção é o melhor tratamento — supervisão constante de crianças menores de 3 anos."}]}},{id:"11.10",titulo:"Pós-desobstrução — cuidados e acompanhamento",conteudo:{tipo:"texto",intro:"Após a resolução da OVACE, mesmo que a vítima aparente estar bem, cuidados específicos são necessários.",blocos:[{tipo:"lista",titulo:"Cuidados obrigatórios pós-desobstrução:",itens:["Avaliar via aérea: possível lesão laríngea ou traqueal pelo corpo estranho ou pelas manobras","Avaliar respiração: hipóxia pode ter ocorrido — SpO2, frequência, esforço","Avaliar possíveis lesões pelas manobras: fratura de costelas, lesão abdominal","Toda vítima de OVACE deve ser avaliada em serviço de saúde, mesmo após resolução espontânea","Objeto pode não ter saído completamente — risco de nova obstrução","Em criança: radiografia de tórax e abdome para localizar objeto se não for recuperado"]},{tipo:"card-grid",cards:[{titulo:"Lesão pelas manobras de Heimlich",subtitulo:"Complicação possível",texto:"Laceração hepática, ruptura gástrica, fraturas costais. Avaliar abdome e tórax. Comunicar ao serviço receptor que manobras foram realizadas."},{titulo:"Comunicar à regulação",subtitulo:"Informação obrigatória",texto:"Relatar: tipo de objeto suspeito, número de ciclos realizados, tempo de obstrução, nível de consciência durante o episódio e estado atual."}]},{tipo:"destaque",texto:"Desobstrução realizada com sucesso não é fim do atendimento — é início do pós-evento. Transporte e avaliação hospitalar são obrigatórios em TODA OVACE, independente da evolução clínica imediata."}]}}]},{id:12,titulo:"Controle de Hemorragias",icone:"🩹",status:"disponivel",topicos:[{id:"12.1",titulo:"Tipos e classificação de hemorragias",conteudo:{tipo:"texto",intro:"Hemorragia é a perda de sangue dos vasos sanguíneos. O reconhecimento do tipo e da gravidade orienta a conduta imediata.",blocos:[{tipo:"card-grid",cards:[{titulo:"Arterial",subtitulo:"Alta pressão, sangue vermelho vivo",texto:"Sangramento pulsátil, em jato. Mais grave — risco de morte em minutos se não controlado."},{titulo:"Venosa",subtitulo:"Fluxo contínuo, sangue escuro",texto:"Sangramento constante, de maior volume. Grave em vasos calibrosos. Controlável com pressão."},{titulo:"Capilar",subtitulo:"Sangramento em lençol",texto:"Pequenas quantidades, superficial. Geralmente de controle mais fácil. Menor urgência."},{titulo:"Interna",subtitulo:"Sem sangramento externo visível",texto:"Suspeitar por mecanismo + sinais de choque. Diagnóstico hospitalar. APH: transporte urgente."}]},{tipo:"lista",titulo:"Classes do choque hemorrágico:",itens:["Classe I: até 15% do volume (750 mL). Sintomas mínimos.","Classe II: 15–30% (750–1500 mL). Taquicardia, ansiedade, pele fria.","Classe III: 30–40% (1500–2000 mL). Hipotensão, taquipneia, confusão.","Classe IV: >40% (>2000 mL). Colapso, inconsciência, risco de morte."]}]}},{id:"12.2",titulo:"Pressão direta e curativos",conteudo:{tipo:"texto",intro:"A pressão direta é o método mais eficaz, simples e disponível para controle de hemorragia externa. Deve ser a primeira intervenção em todo sangramento visível.",blocos:[{tipo:"lista",titulo:"Técnica de pressão direta:",itens:["Usar EPI (luvas) antes de qualquer contato com sangue","Aplicar gaze ou pano limpo diretamente sobre a ferida","Pressionar firme e constante com a palma da mão por no mínimo 10 minutos","NÃO retirar o curativo se encharcado — adicionar mais gazes por cima","Manter a pressão durante o transporte"]},{tipo:"card-grid",cards:[{titulo:"Curativo compressivo",subtitulo:"Para manter a pressão",texto:"Atadura elástica sobre a gaze. Firme, sem comprometer circulação distal."},{titulo:"Gaze hemostática",subtitulo:"QuikClot, Combat Gauze",texto:"Impregnada com agentes coagulantes. Indicada para feridas profundas em cavidades que não permitem pressão externa."},{titulo:"Tamponamento de ferida",subtitulo:"Wound packing",texto:"Preencher feridas cavitárias (axila, virilha, pescoço) com gaze, aplicando pressão digital por 3 minutos."},{titulo:"Elevação do membro",subtitulo:"Complemento à pressão",texto:"Elevar o membro lesionado acima do nível do coração para reduzir a pressão hidrostática no local."}]}]}},{id:"12.3",titulo:"Torniquete",conteudo:{tipo:"texto",intro:"O torniquete é um dispositivo que interrompe o fluxo sanguíneo distal ao local de aplicação. Salva vidas em hemorragias graves de membros.",blocos:[{tipo:"destaque",texto:"O torniquete deixou de ser 'último recurso' — é PRIMEIRA escolha em hemorragias graves de membros que ameaçam a vida."},{tipo:"lista",titulo:"Indicações do torniquete:",itens:["Hemorragia arterial em membro que não responde à pressão direta","Amputação traumática","Ferimento com múltiplos pontos de sangramento impossíveis de controlar individualmente","Cena insegura que impede compressão manual contínua"]},{tipo:"lista",titulo:"Técnica de aplicação:",itens:["Posicionar 5–7 cm acima do ferimento (nunca sobre a articulação)","Apertar até cessação do sangramento e perda do pulso distal","Anotar horário de aplicação em local visível (testa, membro, ficha de atendimento)","NÃO remover no ambiente pré-hospitalar","Nunca cobrir o torniquete"]},{tipo:"card-grid",cards:[{titulo:"CAT (Combat Application Tourniquet)",subtitulo:"Torniquete mais usado no APH",texto:"Rápida aplicação, inclusive com uma mão. Padrão para serviços de emergência."},{titulo:"Improvisado",subtitulo:"Apenas se não houver comercial",texto:"Tiras largas (>5 cm) para evitar lesão por pressão pontual. Nunca use fios, cordas ou cadarços finos."}]}]}},{id:"12.4",titulo:"Choque — reconhecimento e conduta",conteudo:{tipo:"texto",intro:"O choque é a falência do sistema circulatório em manter perfusão adequada dos tecidos. No APH, o choque hipovolêmico hemorrágico é o mais frequente.",blocos:[{tipo:"lista",titulo:"Sinais e sintomas de choque:",itens:["Taquicardia (>100 bpm) — primeiro sinal compensatório","Pele fria, pálida e úmida (suor frio)","Enchimento capilar lento (>2 segundos)","Sede intensa e ansiedade","Alteração do nível de consciência (sonolência, confusão)","Hipotensão (sinal tardio — não espere para diagnosticar choque!)"]},{tipo:"card-grid",cards:[{titulo:"Posicionamento",subtitulo:"Posição de Trendelenburg modificada",texto:"Elevar membros inferiores 30° para melhorar retorno venoso (exceto TCE, trauma torácico ou respiratório)."},{titulo:"Controle da causa",subtitulo:"Prioridade máxima",texto:"Estancar o sangramento antes de qualquer outra medida. Sem controle da causa, o tratamento do choque é ineficaz."},{titulo:"Prevenção de hipotermia",subtitulo:"A tríade da morte",texto:"Hipotermia + acidose + coagulopatia = tríade letal. Aquecer a vítima e o ambiente dentro da ambulância."},{titulo:"Acesso venoso",subtitulo:"Reposição volêmica",texto:"Soro fisiológico 0,9% conforme protocolo médico. Em trauma: evitar excesso de volume antes do controle da hemorragia."}]}]}},{id:"12.5",titulo:"Hemorragias especiais",conteudo:{tipo:"texto",intro:"Algumas hemorragias têm características anatômicas específicas que exigem condutas diferenciadas no APH.",blocos:[{tipo:"card-grid",cards:[{titulo:"Epistaxe (sangramento nasal)",subtitulo:"Conduta",texto:"Sentar a vítima com cabeça levemente inclinada para FRENTE. Comprimir as asas do nariz por 10–15 min. Nunca inclinar para trás (aspiração)."},{titulo:"Ferida na cabeça/couro cabeludo",subtitulo:"Sangramento abundante",texto:"Pressão direta com gaze. Atenção: volume de sangue pode ser enganoso — avaliar se há TCE associado."},{titulo:"Hemorragia abdominal fechada",subtitulo:"Não comprimir!",texto:"Suspeitar por mecanismo + distensão + rigidez. Transporte imediato. Não aplicar pressão externa sobre abdome."},{titulo:"Amputação traumática",subtitulo:"Conduta dupla",texto:"Torniquete no coto. Conservar o segmento amputado em gaze úmida estéril, dentro de saco plástico, sobre gelo (não em contato direto)."}]},{tipo:"destaque",texto:"Sangramento em região de virilha, axila ou pescoço: usar gaze hemostática + tamponamento digital. Torniquete é impossível nessas regiões."}]}}]},{id:13,titulo:"Trauma",icone:"🦴",status:"disponivel",topicos:[{id:"13.1",titulo:"Abordagem ao politraumatizado — XABCDE",conteudo:{tipo:"texto",intro:"O politraumatizado é a vítima com múltiplas lesões, muitas vezes envolvendo dois ou mais sistemas orgânicos. A abordagem segue o protocolo XABCDE.",blocos:[{tipo:"cadeia",elos:[{numero:0,titulo:"X — Hemorragia exsanguinante",icone:"🩸",cor:"#e53e3e",descricao:"Controlar sangramento maciço ANTES de qualquer outra intervenção."},{numero:0,titulo:"A — Via aérea + cervical",icone:"💨",cor:"#dd6b20",descricao:"Manter alinhamento cervical. Abrir via aérea sem hiperextensão."},{numero:0,titulo:"B — Ventilação",icone:"🫁",cor:"#d69e2e",descricao:"Avaliar frequência, profundidade, simetria. Tratar pneumotórax hipertensivo."},{numero:0,titulo:"C — Circulação",icone:"❤️",cor:"#38a169",descricao:"Controle de hemorragias. Acesso venoso. Avaliar perfusão."},{numero:0,titulo:"D — Disfunção neurológica",icone:"🧠",cor:"#3182ce",descricao:"Glasgow, pupilas, déficit motor. Suspeitar de TCE e lesão medular."},{numero:0,titulo:"E — Exposição",icone:"👀",cor:"#805ad5",descricao:"Expor completamente. Avaliar o dorso. Prevenir hipotermia."}]},{tipo:"destaque",texto:"TEMPO É TUDO no politrauma. 'Scoop and run' em instáveis: estabilize o que é estabilizável na cena e transporte. Cirurgia é o tratamento definitivo."}]}},{id:"13.2",titulo:"Traumatismo crânio-encefálico",conteudo:{tipo:"texto",intro:"O TCE é uma das principais causas de morte e sequela em vítimas de trauma. O APH tem papel fundamental na prevenção do dano cerebral secundário.",blocos:[{tipo:"card-grid",cards:[{titulo:"TCE Leve",subtitulo:"Glasgow 13–15",texto:"Pode haver perda de consciência breve, cefaleia, náusea. Observação e transporte para avaliação."},{titulo:"TCE Moderado",subtitulo:"Glasgow 9–12",texto:"Maior risco de lesão intracraniana. Monitorização contínua e transporte imediato."},{titulo:"TCE Grave",subtitulo:"Glasgow ≤ 8",texto:"Risco imediato de herniação. Suporte ventilatório, normóxia (SpO2 94–98%), normocapnia. EVITAR hiperventilação."},{titulo:"Sinais de alerta",subtitulo:"Herniação iminente",texto:"Anisocoria (pupilas assimétricas), postura de decorticação/descerebração, piora rápida do Glasgow."}]},{tipo:"destaque",texto:"No TCE grave: evitar hipotensão e hipóxia a qualquer custo. São as duas principais causas de lesão cerebral secundária e aumentam a mortalidade dramaticamente."}]}},{id:"13.3",titulo:"Trauma de coluna vertebral",conteudo:{tipo:"texto",intro:"A suspeita de lesão de coluna vertebral deve ser considerada em todo trauma de alta energia, especialmente com mecanismo de flexão-extensão, queda ou impacto direto.",blocos:[{tipo:"lista",titulo:"Quando suspeitar de lesão cervical:",itens:["Mecanismo de alta energia: capotamento, impacto frontal, queda >1 metro","Trauma em mergulho em água rasa","Dor ou sensibilidade cervical à palpação","Déficit neurológico nos membros (dormência, formigamento, fraqueza)","Nível de consciência alterado que impede avaliação confiável"]},{tipo:"card-grid",cards:[{titulo:"Imobilização manual",subtitulo:"Primeiro passo",texto:"Manter a cabeça em posição neutra com as duas mãos. Não mover até imobilização definitiva."},{titulo:"Colar cervical",subtitulo:"Complemento à imobilização",texto:"Limita movimentos, mas não imobiliza sozinho. Sempre associar à imobilização manual e prancha."},{titulo:"Prancha longa",subtitulo:"Extricação e transporte",texto:"Retirada coordenada da vítima mantendo eixo cabeça-pescoço-tronco alinhado. Mínimo 3 socorristas."},{titulo:"KED (Kendrick)",subtitulo:"Extricação de veículo",texto:"Colete de extricação usado para retirar a vítima presa em veículo sem mobilizar a coluna."}]}]}},{id:"13.4",titulo:"Trauma de tórax e abdome",conteudo:{tipo:"texto",intro:"Lesões torácicas e abdominais podem ser silenciosas no início e rapidamente fatais. O APH foca no reconhecimento e estabilização para transporte urgente.",blocos:[{tipo:"card-grid",cards:[{titulo:"Fratura de costelas",subtitulo:"Dor à respiração",texto:"Múltiplas fraturas consecutivas = tórax instável (flail chest). Tratamento: ventilação de pressão positiva."},{titulo:"Contusão pulmonar",subtitulo:"Lesão do parênquima",texto:"Hipóxia progressiva horas após o trauma. Suporte com O2 e ventilação adequada."},{titulo:"Tamponamento cardíaco",subtitulo:"Tríade de Beck",texto:"Hipotensão + estase jugular + abafamento das bulhas. Pericardiocentese de emergência (SAV)."},{titulo:"Trauma abdominal",subtitulo:"Vísceras maciças e ocas",texto:"Baço e fígado são os mais lesionados no trauma fechado. Evisceração: curativo úmido, não recolocar alças."}]},{tipo:"destaque",texto:"Trauma abdominal fechado com sinais de choque = hemorragia interna até prova em contrário. Transporte imediato. Não perca tempo na cena."}]}},{id:"13.5",titulo:"Trauma de membros e pelve",conteudo:{tipo:"texto",intro:"Fraturas podem causar perdas sanguíneas significativas e complicações sistêmicas. A imobilização adequada reduz a dor, o sangramento e o risco de lesão neurovascular.",blocos:[{tipo:"card-grid",cards:[{titulo:"Fratura de fêmur",subtitulo:"Perda de 1500–2000 mL",texto:"Imobilizar com tração. Verificar pulso distal antes e depois da imobilização. Risco de choque."},{titulo:"Fratura de pelve",subtitulo:"Perda de até 4 litros",texto:"Não testar estabilidade repetidamente. Cinto pélvico de emergência ou lençol dobrado para compressão."},{titulo:"Fratura exposta",subtitulo:"Osso visível",texto:"NÃO recolocar o osso. Curativo estéril úmido sobre a ferida. Imobilizar no posição encontrada."},{titulo:"Síndrome do esmagamento",subtitulo:"Crush syndrome",texto:"Liberação de mioglobina após descompressão de músculo isquemiado. Hidratação agressiva antes da descompressão."}]},{tipo:"lista",titulo:"Antes e após imobilizar: sempre verificar:",itens:["Pulso distal ao foco de fratura","Sensibilidade (formigamento, dormência)","Motricidade dos dedos distais","Temperatura e coloração do membro"]}]}}]},{id:14,titulo:"Queimaduras",icone:"🔥",status:"disponivel",topicos:[{id:"14.1",titulo:"Classificação das queimaduras",conteudo:{tipo:"texto",intro:"As queimaduras são lesões teciduais causadas por agentes térmicos, químicos, elétricos ou radioativos. A classificação orienta o tratamento e a gravidade.",blocos:[{tipo:"card-grid",cards:[{titulo:"1º Grau — Superficial",subtitulo:"Epiderme apenas",texto:"Eritema (vermelhidão), dor ao toque, sem bolhas. Exemplo: queimadura de sol. Cicatriza espontaneamente em 3–5 dias. NÃO conta no cálculo de SCQ."},{titulo:"2º Grau Superficial",subtitulo:"Epiderme + derme superficial",texto:"Bolhas, base eritematosa e úmida, DOR INTENSA (terminações nervosas preservadas). Cicatriza em 14–21 dias com cuidados adequados."},{titulo:"2º Grau Profundo",subtitulo:"Derme profunda comprometida",texto:"Bolhas, base pálida ou avermelhada, dor reduzida (destruição parcial de nervos). Cicatriza lentamente, pode necessitar enxerto."},{titulo:"3º Grau — Espessura total",subtitulo:"Toda a pele + estruturas profundas",texto:"Carbonização ou aspecto de couro, INDOLOR (destruição de nervos), sem bolhas. Exige enxerto. Toda a espessura da pele destruída."}]},{tipo:"destaque",texto:"Regra prática: dói muito = 2º grau (nervos intactos). Não dói = 3º grau (nervos destruídos). Mas na prática as queimaduras mistas são as mais comuns."}]}},{id:"14.2",titulo:"Cálculo da superfície corporal queimada",conteudo:{tipo:"texto",intro:"Estimar a extensão da queimadura é fundamental para definir a gravidade, a necessidade de internação e o volume de reposição volêmica.",blocos:[{tipo:"card-grid",cards:[{titulo:"Regra dos Nove — Adulto",subtitulo:"Wallace",texto:"Cabeça: 9% | Cada braço: 9% | Tórax anterior: 18% | Dorso: 18% | Cada MMII: 18% | Períneo: 1%. Total = 100%."},{titulo:"Regra dos Nove — Criança",subtitulo:"Lund-Browder (mais preciso)",texto:"Cabeça maior proporcionalmente (até 18% em lactente). Membros inferiores menores. Usar tabela de Lund-Browder para crianças."},{titulo:"Regra da Palma da Mão",subtitulo:"Queimaduras irregulares",texto:"A palma da mão da vítima (incluindo dedos) = 1% da SCQ. Útil para calcular áreas irregulares ou pequenas queimaduras dispersas."},{titulo:"O que contar no cálculo",subtitulo:"Apenas 2º e 3º graus",texto:"1º grau NÃO entra no cálculo de SCQ. Contar apenas 2º e 3º grau para definir gravidade e reposição volêmica."}]},{tipo:"lista",titulo:"Critérios de internação em queimados:",itens:["2º grau > 10% da SCQ em adultos / > 5% em crianças ou idosos","Qualquer queimadura de 3º grau","Queimadura em face, mãos, pés, genitália, períneo ou grandes articulações","Queimadura por inalação (via aérea comprometida)","Queimadura elétrica ou química","Queimaduras circunferenciais (risco de síndrome compartimental)"]}]}},{id:"14.3",titulo:"Atendimento pré-hospitalar em queimaduras",conteudo:{tipo:"texto",intro:"Os primeiros cuidados no APH influenciam diretamente a evolução da queimadura. Medidas simples e corretas fazem diferença significativa.",blocos:[{tipo:"lista",titulo:"Sequência de atendimento no APH:",itens:["1. Segurança da cena: afastar a vítima da fonte sem se expor (queimadura química, elétrica, incêndio)","2. Interromper o processo de queimadura: remover roupas e objetos não aderidos (anéis, relógios)","3. Resfriar com água em temperatura AMBIENTE por 10–20 min (não gelada — piora a hipotermia)","4. Avaliar ABCDE: via aérea em prioridade (queimadura de inalação pode fechar em horas)","5. Colocar curativo não aderente sobre a queimadura (gaze parafinada ou campo estéril úmido)","6. Prevenção de hipotermia: aquecer o ambiente e cobrir áreas não queimadas","7. Acesso venoso e analgesia conforme protocolo","8. Transporte ao hospital de referência"]},{tipo:"destaque",texto:"NUNCA aplicar: gelo (hipotermia e vasoconstrição), manteiga, pasta dental, creme ou qualquer produto caseiro. Causam infecção, dificultam a avaliação e podem piorar a queimadura."}]}},{id:"14.4",titulo:"Queimaduras especiais: elétrica, química e inalação",conteudo:{tipo:"texto",intro:"Queimaduras por agentes especiais têm particularidades que exigem condutas diferenciadas e maior atenção da equipe de APH.",blocos:[{tipo:"card-grid",cards:[{titulo:"Queimadura Elétrica",subtitulo:"Condutas específicas",texto:"Desligar a fonte ANTES de aproximar (risco de choque para o socorrista). A lesão interna é sempre maior que a externa. Risco de: rabdomiólise, arritmias, PCR. Monitorização cardíaca obrigatória."},{titulo:"Queimadura Química",subtitulo:"Ácidos e álcalis",texto:"Lavar com água corrente abundante por no mínimo 20 minutos. Não usar neutralizante (reação exotérmica piora a lesão). Remover roupas e joias contaminadas com EPI."},{titulo:"Queimadura por Inalação",subtitulo:"A mais perigosa",texto:"Suspeitar em: incêndio em ambiente fechado, fuligem nas narinas, sobrancelhas chamuscadas, rouquidão, estridor. Via aérea pode fechar rapidamente — IOT precoce se disponível."},{titulo:"Intoxicação por CO",subtitulo:"Monóxido de carbono",texto:"Inodoro e incolor — 'assassino silencioso'. Cefaleia, náusea, confusão, coma. SpO2 normal (CO liga na hemoglobina igual O2). Tratamento: O2 100% máscara com reservatório."}]},{tipo:"destaque",texto:"Queimadura elétrica: a ferida de entrada pode parecer pequena, mas o trajeto elétrico interno pode destruir músculos, vasos e causar PCR. Tratar sempre como trauma de alta energia."}]}},{id:"14.5",titulo:"Reposição volêmica e cuidados contínuos",conteudo:{tipo:"texto",intro:"Grandes queimados perdem volume plasmático rapidamente pelo aumento da permeabilidade capilar. A reposição volêmica precoce e adequada é fundamental.",blocos:[{tipo:"card-grid",cards:[{titulo:"Fórmula de Parkland",subtitulo:"Reposição nas primeiras 24h",texto:"Ringer Lactato: 4 mL × peso (kg) × % SCQ. 50% nas primeiras 8h. 50% nas 16h seguintes. Calculada a partir da hora da queimadura, não da chegada ao hospital."},{titulo:"Diurese como parâmetro",subtitulo:"Monitorização da volemia",texto:"Adulto: 0,5 mL/kg/h. Criança: 1 mL/kg/h. Rabdomiólise (queimadura elétrica): 1–2 mL/kg/h para eliminar mioglobina."},{titulo:"Analgesia",subtitulo:"Dor intensa e contínua",texto:"2º grau = dor intensa. Analgesia adequada reduz o estresse, diminui liberação de catecolaminas e melhora a cooperação. Conforme protocolo médico."},{titulo:"Prevenção de hipotermia",subtitulo:"Risco grave em grandes queimados",texto:"Grande SCQ = grande perda de calor. Cobrir com campos estéreis, aquecer a ambulância (28°C), soluções aquecidas quando possível."}]},{tipo:"destaque",texto:"O grande queimado precisa de centro especializado. No APH: estabilizar a via aérea, iniciar reposição, prevenir hipotermia e transportar ao hospital de referência para queimados."}]}}]},{id:15,titulo:"Afogamento",icone:"🌊",status:"disponivel",topicos:[{id:"15.1",titulo:"Conceito, epidemiologia e classificação",conteudo:{tipo:"texto",intro:"O afogamento é a segunda causa de morte acidental no Brasil. A abordagem correta no APH pode reverter casos que parecem sem esperança.",blocos:[{tipo:"destaque",texto:"DEFINIÇÃO OMS/ILCOR: Afogamento é o processo de comprometimento respiratório resultante de submersão ou imersão em um líquido. Pode ou não resultar em morte."},{tipo:"card-grid",cards:[{titulo:"Grau 1",subtitulo:"Tosse sem espuma",texto:"Via aérea mantida. Boa perfusão. Melhor prognóstico. Ausculta normal ou com leve broncoespasmo."},{titulo:"Grau 2",subtitulo:"Pouca espuma, boa perfusão",texto:"Algum comprometimento da troca gasosa. Ausculta com poucos estertores. Necessita de O2."},{titulo:"Grau 3",subtitulo:"Espuma moderada, hipotensão",texto:"Comprometimento significativo. Edema pulmonar em formação. SpO2 reduzida. Risco de evolução rápida."},{titulo:"Grau 4",subtitulo:"Espuma abundante, choque",texto:"Edema pulmonar grave. Hipotensão. Cianose. Alto risco de deterioração para PCR."}]},{tipo:"card-grid",cards:[{titulo:"Grau 5",subtitulo:"Apneia, pulso presente",texto:"Parada respiratória sem PCR. Ventilação imediata com BVM. Tempo crítico para evitar a PCR."},{titulo:"Grau 6",subtitulo:"PCR — Parada completa",texto:"Apneia + ausência de pulso. Pior prognóstico, mas recuperações são possíveis. RCP imediata com ênfase nas ventilações."},{titulo:"Água salgada vs. doce",subtitulo:"Faz diferença?",texto:"Na prática clínica: não há diferença significativa no tratamento. O mecanismo principal é a hipóxia em ambos os casos."},{titulo:"Hipotermia no afogamento",subtitulo:"Fator protetor e complicador",texto:"Água fria pode proteger o cérebro (hipotermia protetora). Mas também complica a RCP e exige reaquecimento. Manter RCP até hospital."}]}]}},{id:"15.2",titulo:"Resgate com segurança",conteudo:{tipo:"texto",intro:"O resgate de vítima de afogamento é potencialmente fatal para o socorrista despreparado. A segurança do resgatista é sempre a primeira prioridade.",blocos:[{tipo:"card-grid",cards:[{titulo:"Alcançar",subtitulo:"Sem entrar na água",texto:"Estender um galho, cabo elétrico, corda, toalha. Sempre que possível, resgatar sem entrar na água."},{titulo:"Jogar",subtitulo:"Boia ou objeto flutuante",texto:"Arremessar boia salva-vidas, galão vazio, câmara de ar para a vítima se agarrar e ser puxada."},{titulo:"Remar",subtitulo:"Embarcação para o resgate",texto:"Aproximar com barco, prancha ou outro equipamento. Manter distância da vítima que pode se agarrar e afundar o socorrista."},{titulo:"Nadar — ÚLTIMO recurso",subtitulo:"Com equipamento e treinamento",texto:"Entrar na água SOMENTE com colete salva-vidas, corda de segurança e treinamento específico. Vítima em pânico pode afogar o socorrista."}]},{tipo:"destaque",texto:"REGRA DO BOMBEIRO: Alcançar, Jogar, Remar, Nadar — nessa ordem. Um socorrista afogado é mais uma vítima. O melhor resgate é o que salva a vítima SEM criar novas vítimas."}]}},{id:"15.3",titulo:"Atendimento e RCP no afogamento",conteudo:{tipo:"texto",intro:"A RCP no afogamento tem particularidades importantes em relação ao padrão do adulto. A hipóxia é a causa primária — as ventilações são prioridade.",blocos:[{tipo:"lista",titulo:"Sequência de atendimento no afogamento — AHA 2025:",itens:["1. Resgatar com segurança — não entrar na água sem EPI e treinamento","2. Iniciar ventilações de resgate AINDA NA ÁGUA se possível (sem atrasar o resgate)","3. Ao sair da água: avaliar nível de consciência e respiração","4. Se inconsciente e sem respiração: 5 VENTILAÇÕES DE RESGATE antes das compressões","5. Se sem pulso após as ventilações: iniciar RCP 30:2","6. DEA assim que disponível — ritmos chocáveis são menos comuns no afogamento (predomina assistolia)","7. Prevenir hipotermia: remover roupas molhadas, cobrir, aquecer","8. Transporte imediato — todo afogado, mesmo com recuperação aparente, deve ir ao hospital"]},{tipo:"card-grid",cards:[{titulo:"Proteção cervical no afogamento",subtitulo:"Quando é necessária?",texto:"Apenas se houver história de mergulho em água rasa, trauma associado ou sinais de lesão cervical. Na maioria dos afogamentos: não é necessária e atrasa o atendimento."},{titulo:"Manobra de Heimlich no afogamento",subtitulo:"Contraindicada",texto:"NÃO fazer Heimlich para retirar água dos pulmões. Sem evidência de benefício, atrasa a RCP e pode causar lesão abdominal e vômito com broncoaspiração."},{titulo:"'Drowned but not dead'",subtitulo:"Nunca desistir precocemente",texto:"Afogados em água fria com hipotermia podem ser recuperados após longos períodos de PCR. Manter RCP até o hospital. Decisão de interrupção é médica."},{titulo:"Síndrome de imersão",subtitulo:"Colapso reflexo no contato com água fria",texto:"Parada cardíaca reflexa por imersão súbita em água muito fria. RCP imediata — prognóstico pode ser surpreendentemente bom com reaquecimento."}]}]}},{id:"15.4",titulo:"Cuidados pós-resgate e transporte",conteudo:{tipo:"texto",intro:"Todo afogado, mesmo que aparentemente bem após o resgate, deve ser transportado e avaliado em ambiente hospitalar. O edema pulmonar pode se desenvolver horas depois.",blocos:[{tipo:"card-grid",cards:[{titulo:"Afogamento secundário",subtitulo:"Risco nas primeiras 24h",texto:"Edema pulmonar pode se desenvolver horas após o incidente, mesmo em vítimas que pareciam bem. Todo afogado deve ser observado por no mínimo 6–24h no hospital."},{titulo:"Monitorização no transporte",subtitulo:"Parâmetros críticos",texto:"SpO2 (alvo >95%), FR, FC, PA, temperatura, nível de consciência. Qualquer deterioração deve ser comunicada à regulação."},{titulo:"Hipotermia",subtitulo:"Tratamento no transporte",texto:"Remover roupas molhadas, cobrir com cobertores secos, aquecer o interior da ambulância, soluções aquecidas se disponíveis. Não friccionar."},{titulo:"O2 suplementar",subtitulo:"Todo afogado deve receber",texto:"Mesmo SpO2 >95%: O2 por máscara facial a 10–12 L/min por 30 min. Pulmões afogados podem ter edema subclínico nas primeiras horas."}]},{tipo:"destaque",texto:"REGRA: todo afogado vai ao hospital. Não existe 'tá bem, pode ir pra casa' na cena de afogamento. O edema pulmonar tardio pode ser fatal se não monitorado."}]}},{id:"15.5",titulo:"Prevenção e situações especiais",conteudo:{tipo:"texto",intro:"A prevenção do afogamento é responsabilidade de saúde pública. O socorrista também tem papel educativo na comunidade.",blocos:[{tipo:"card-grid",cards:[{titulo:"Afogamento em piscina",subtitulo:"Principal causa em crianças",texto:"Silencioso e rápido — criança submersa não grita. Supervisão constante, grades de proteção, alarmes. Iniciar RCP imediatamente ao resgatar."},{titulo:"Afogamento em rio com correnteza",subtitulo:"Técnica de resgate",texto:"Não nadar contra a correnteza — nadar em diagonal para a margem. Usar boia e corda. Risco de afogamento em cachoeiras por sucção."},{titulo:"Afogamento em mar",subtitulo:"Corrente de retorno",texto:"Corrente de retorno (rip current): não nadar contra ela — nadar paralelo à praia até sair da corrente. Principal causa de afogamento no litoral."},{titulo:"Mergulho em água rasa",subtitulo:"TCE + afogamento",texto:"Risco duplo: TCE com lesão cervical + afogamento. Proteção cervical obrigatória. Resgatar com o mínimo de movimento da coluna."}]},{tipo:"lista",titulo:"Fatores de risco para afogamento:",itens:["Criança sem supervisão perto de qualquer lâmina d'água","Uso de álcool e drogas próximo à água (responsável por 25-50% dos afogamentos em adultos)","Ausência de habilidade de natação","Epilepsia sem controle adequado","Natação em rios e represas sem balizamento e guardas-vidas"]}]}}]},{id:16,titulo:"Emergências Clínicas",icone:"⚕️",status:"disponivel",topicos:[{id:"16.1",titulo:"Emergências cardiovasculares — IAM e Edema Pulmonar",conteudo:{tipo:"texto",intro:"As emergências cardiovasculares representam as principais causas de morte súbita. O reconhecimento precoce e a ativação do sistema de saúde são determinantes.",blocos:[{tipo:"card-grid",cards:[{titulo:"IAM — Reconhecimento",subtitulo:"Infarto Agudo do Miocárdio",texto:"Dor precordial opressiva, irradiação para braço esquerdo/mandíbula, sudorese, náusea, dispneia. Pode ser silencioso em diabéticos e idosos."},{titulo:"IAM — Conduta no APH",subtitulo:"Ação imediata",texto:"Repouso, monitorização, O2 se SpO2 <94%, acesso venoso, ECG se disponível, AAS 300mg se não contraindicado. Ativar protocolo de dor torácica."},{titulo:"Edema Agudo de Pulmão",subtitulo:"Dispneia grave",texto:"Ortopneia, estertores bilaterais, expectoração rósea/espumosa. Posição sentada, O2 alto fluxo, monitorização, comunicar regulação."},{titulo:"Dissecção Aórtica",subtitulo:"Dor em rasgo dorsal",texto:"Dor torácica/dorsal intensa em 'rasgo', diferença de PA entre os braços, pulsos assimétricos. Transporte urgente ao hospital de referência."}]},{tipo:"destaque",texto:"Na dor torácica aguda: sempre suspeitar de IAM. Acionar o serviço receptor pelo caminho — o tempo 'porta-balão' é determinante para a sobrevida."}]}},{id:"16.2",titulo:"AVC — Acidente Vascular Cerebral",conteudo:{tipo:"texto",intro:"O AVC é uma emergência tempo-dependente. A janela terapêutica para trombólise no AVC isquêmico é de até 4,5 horas do início dos sintomas.",blocos:[{tipo:"destaque",texto:"FAST: Face (assimetria) + Arm (braço caído) + Speech (fala alterada) + Time (acionar socorro imediatamente)."},{tipo:"card-grid",cards:[{titulo:"AVC Isquêmico",subtitulo:"80% dos casos",texto:"Oclusão arterial. Déficit focal súbito. Candidato à trombólise se dentro da janela terapêutica."},{titulo:"AVC Hemorrágico",subtitulo:"20% dos casos",texto:"Rotura de vaso. Cefaleia intensa súbita, vômitos, rigidez de nuca. Maior gravidade."},{titulo:"AIT",subtitulo:"Ataque Isquêmico Transitório",texto:"Déficit que regride. ALTA probabilidade de AVC nas próximas 24h. Tratar como urgência."},{titulo:"Conduta no APH",subtitulo:"Ação imediata",texto:"Anotar horário EXATO dos primeiros sintomas, monitorização, glicemia, O2, comunicar hospital receptor."}]}]}},{id:"16.3",titulo:"Emergências respiratórias",conteudo:{tipo:"texto",intro:"Crises respiratórias agudas podem evoluir rapidamente para insuficiência respiratória e PCR. A intervenção precoce é fundamental.",blocos:[{tipo:"card-grid",cards:[{titulo:"Crise de Asma Grave",subtitulo:"Broncoespasmo agudo",texto:"Sibilos, musculatura acessória, taquicardia. Broncodilatador inalatório, O2, posição sentada. Silêncio no tórax = sinal de gravidade extrema."},{titulo:"DPOC Descompensada",subtitulo:"Exacerbação aguda",texto:"Dispneia em repouso, cianose. O2 CONTROLADO (SpO2 alvo 88–92% no DPOC). Evitar hiperóxia."},{titulo:"Embolia Pulmonar",subtitulo:"Dispneia súbita inexplicada",texto:"Dispneia súbita, taquicardia, dor pleurítica, hemoptise. Fatores de risco: TVP, imobilização, neoplasia."},{titulo:"Insuficiência Respiratória",subtitulo:"Via aérea avançada",texto:"SpO2 <88% refratária, esforço extremo, rebaixamento de consciência: ventilar com BVM. Comunicar regulação."}]}]}},{id:"16.4",titulo:"Emergências neurológicas e metabólicas",conteudo:{tipo:"texto",intro:"Alterações do nível de consciência de origem neurológica ou metabólica são frequentes no APH. A glicemia deve ser verificada em todo paciente com alteração de consciência.",blocos:[{tipo:"card-grid",cards:[{titulo:"Hipoglicemia",subtitulo:"Glicemia < 70 mg/dL",texto:"Tremores, sudorese, confusão, inconsciência. Consciente: glicose oral. Inconsciente: glicose 50% IV ou glucagon IM."},{titulo:"Hiperglicemia / CAD",subtitulo:"Glicemia muito elevada",texto:"Polidipsia, poliúria, hálito cetônico, respiração de Kussmaul. Hidratação e transporte."},{titulo:"Convulsões",subtitulo:"Crise epiléptica",texto:"Proteger de lesões, posição lateral após a crise, O2, não segurar. Status >5 min: BDZ se disponível."},{titulo:"Sepse / Meningite",subtitulo:"Emergência infecciosa",texto:"Febre, rigidez de nuca, petéquias, alteração de consciência. Risco de choque séptico. Transporte imediato."}]},{tipo:"destaque",texto:"Todo paciente com alteração de consciência sem causa aparente: verificar glicemia capilar ANTES de qualquer outra conduta. Hipoglicemia é a causa mais tratável."}]}},{id:"16.5",titulo:"Anafilaxia e emergências ambientais",conteudo:{tipo:"texto",intro:"Reações alérgicas graves e emergências por causas ambientais exigem reconhecimento rápido e tratamento imediato.",blocos:[{tipo:"card-grid",cards:[{titulo:"Anafilaxia",subtitulo:"Alérgeno → reação sistêmica grave",texto:"Urticária, angioedema, broncoespasmo, hipotensão. ADRENALINA IM (0,3–0,5mg) é o tratamento de 1ª escolha. Anti-histamínico e corticoide são adjuvantes."},{titulo:"Choque Anafilático",subtitulo:"Colapso circulatório",texto:"Adrenalina IM + Trendelenburg + reposição volêmica agressiva."},{titulo:"Hipertermia / Insolação",subtitulo:"Temperatura >40°C",texto:"Confusão, pele quente e seca, colapso. Resfriar imediatamente: sombra, roupas, compressas frias, hidratação."},{titulo:"Hipotermia",subtitulo:"Temperatura < 35°C",texto:"Tremores, confusão, arritmias. Remover roupas molhadas, isolar do frio, aquecer gradativamente. RCP se PCR."}]}]}}]},{id:17,titulo:"Agitação Psicomotora",icone:"🧠",status:"disponivel",topicos:[{id:"17.1",titulo:"Conceito, causas e avaliação",conteudo:{tipo:"texto",intro:"A agitação psicomotora é um estado de hiperatividade motora e verbal que compromete a cooperação da vítima e pode representar risco para ela, para a equipe e para terceiros.",blocos:[{tipo:"card-grid",cards:[{titulo:"Causas orgânicas — AEIOU TIPS",subtitulo:"Sempre descartar primeiro",texto:"Álcool/drogas, Epilepsia, Insulina (hipoglicemia), Overdose/Óxido de carbono, Uremia | Trauma (TCE), Infecção (sepse/meningite), Psiquiátrico, Stroke (AVC)"},{titulo:"Hipoglicemia",subtitulo:"Causa mais comum e tratável",texto:"Todo agitado: medir glicemia ANTES de qualquer outra abordagem. Glicemia <70 mg/dL: glicose oral (se consciente) ou 50% IV (se não)."},{titulo:"Intoxicação por substâncias",subtitulo:"Mais frequente",texto:"Álcool, cocaína, anfetaminas, inalantes, maconha sintética (K2/Spice). Identificar substância — orienta o tratamento e os antídotos disponíveis."},{titulo:"Causas psiquiátricas",subtitulo:"Diagnóstico de exclusão",texto:"Crise maníaca, esquizofrenia, psicose aguda, transtorno dissociativo. Tratar apenas após descartar causas orgânicas reversíveis."}]},{tipo:"destaque",texto:"REGRA DE OURO: agitação = causa orgânica até prova em contrário. Nunca assuma que é 'só psiquiátrico' antes de verificar glicemia, SpO2 e história clínica."}]}},{id:"17.2",titulo:"Abordagem verbal e não-verbal",conteudo:{tipo:"texto",intro:"A comunicação é a primeira linha de intervenção em vítima agitada consciente. Uma abordagem verbal eficaz pode evitar contenção física e reduzir o risco de lesões.",blocos:[{tipo:"lista",titulo:"Técnicas de abordagem verbal (De-escalada):",itens:["Apresentar-se calmamente: 'Meu nome é Marco, sou enfermeiro, estou aqui para ajudar'","Usar voz calma, tom baixo e ritmo lento — não combater agitação com agitação","Manter distância segura (2–3 metros) e postura não ameaçadora","Fazer contato visual respeitoso — não encarar de forma dominante","Usar linguagem simples e perguntas abertas: 'Como você está se sentindo?'","Evitar ordens e ultimatos — oferecer escolhas quando possível","Reconhecer a emoção sem validar o comportamento: 'Entendo que você está com raiva'"]},{tipo:"card-grid",cards:[{titulo:"Posicionamento da equipe",subtitulo:"Segurança no atendimento",texto:"Equipe em semicírculo, sem bloquear a saída da vítima. Uma pessoa fala (liderança verbal) — as outras observam e aguardam sem interagir."},{titulo:"Retirada de objetos perigosos",subtitulo:"Avaliação ambiental",texto:"Remover discretamente objetos que possam ser usados como arma: faqueiros, objetos de vidro, ferramentas. Sem chamar atenção para isso."},{titulo:"Quando a verbal falha",subtitulo:"Decisão de contenção",texto:"Se a vítima representa risco imediato para si ou para a equipe e não responde à abordagem verbal: preparar contenção com equipe suficiente."},{titulo:"Apoio policial",subtitulo:"Quando solicitar",texto:"Cena com risco de violência para a equipe, arma presente, múltiplos agredores. Aguardar liberação policial — segurança primeiro."}]}]}},{id:"17.3",titulo:"Contenção física — técnica e cuidados",conteudo:{tipo:"texto",intro:"A contenção física é o último recurso após falha da abordagem verbal. Deve ser executada com técnica correta para garantir segurança da vítima e da equipe.",blocos:[{tipo:"lista",titulo:"Protocolo de contenção física:",itens:["Mínimo 4–5 pessoas: 1 por membro + 1 para a cabeça","Coordenação: uma pessoa comanda ('vamos conter ao sinal de 3: 1, 2, 3')","Posição: decúbito DORSAL — NUNCA prona (risco fatal de asfixia posicional)","Imobilizar membros com fixadores ou ataduras — não com força manual contínua","Manter a cabeça em posição neutra — evitar hiperextensão ou flexão","Um socorrista monitora via aérea, respiração e nível de consciência continuamente","Registrar horário de início da contenção na ficha de atendimento"]},{tipo:"destaque",texto:"POSIÇÃO PRONA EM AGITADO É PROIBIDA. Risco de asfixia posicional — compressão torácica + hiperflexão do pescoço + esforço muscular = morte. Sempre decúbito DORSAL."},{tipo:"card-grid",cards:[{titulo:"Síndrome de Excitação Aguda (ExDS)",subtitulo:"Emergência médica",texto:"Agitação extrema, hipertermia, força supra-normal, insensibilidade à dor, diaforese. ALTO risco de PCR súbita. Contenção + SAV urgente + comunicar regulação."},{titulo:"Monitorização pós-contenção",subtitulo:"Obrigatória e contínua",texto:"SpO2, FR, FC, coloração e nível de consciência a cada 2–3 minutos. A contenção pode descompensar vítimas com condições clínicas subjacentes."}]}]}},{id:"17.4",titulo:"Sedação farmacológica e aspectos legais",conteudo:{tipo:"texto",intro:"A sedação farmacológica em vítimas agitadas é prerrogativa médica ou de enfermeiro com prescrição médica. O técnico de enfermagem administra conforme orientação.",blocos:[{tipo:"card-grid",cards:[{titulo:"Midazolam",subtitulo:"BDZ — primeira escolha frequente",texto:"0,05–0,1 mg/kg IM/IV. Sedação leve a moderada. Antídoto: flumazenil. Depressão respiratória possível — monitorizar."},{titulo:"Haloperidol",subtitulo:"Antipsicótico clássico",texto:"5–10 mg IM em adultos. Indicado em psicose aguda e agitação sem causa orgânica. Efeito tardio (30–60 min IM). Risco de distonias agudas."},{titulo:"Cetamina",subtitulo:"Dissociativo — SAV",texto:"1–2 mg/kg IV ou 4–6 mg/kg IM. Rápido início. Mantém via aérea e reflexos. Usada em ExDS e quando outras drogas falham. Exige equipe treinada."},{titulo:"Quem pode administrar",subtitulo:"Responsabilidade legal",texto:"Médico regulador via rádio ou protocolo médico assinado pelo médico responsável. Técnico de enfermagem administra conforme prescrição — NUNCA por iniciativa própria."}]},{tipo:"lista",titulo:"Aspectos legais da contenção e sedação:",itens:["Contenção sem justificativa documentada pode configurar constrangimento ilegal","Registrar na ficha: tentativas de abordagem verbal, motivo da contenção, horário, posição e monitorização","Sedação sem prescrição médica é exercício ilegal da medicina (CP Art. 282)","Em risco de morte iminente: beneficência justifica a contenção com documentação posterior","Comunicar regulação médica em TODA contenção física — médico regulador deve ser informado"]}]}},{id:"17.5",titulo:"Cuidado com o socorrista",conteudo:{tipo:"texto",intro:"Atendimentos de agitação psicomotora são física e emocionalmente exaustivos. O cuidado com a equipe é parte do protocolo.",blocos:[{tipo:"card-grid",cards:[{titulo:"Risco de lesão na equipe",subtitulo:"Prevenção ativa",texto:"Mordidas, socos, chutes e escarros são riscos reais. EPI (luvas, proteção ocular), número adequado de socorristas e técnica correta reduzem o risco."},{titulo:"Exposição a fluidos corporais",subtitulo:"Protocolo pós-exposição",texto:"Mordida ou contato com sangue/saliva: lavar imediatamente, comunicar ao serviço de saúde ocupacional, avaliar necessidade de profilaxia para HIV e hepatites."},{titulo:"Impacto emocional",subtitulo:"Normal e esperado",texto:"Atender vítima violenta, em crise psiquiátrica grave ou sob efeito de drogas é estressante. Debriefing pós-ocorrência é importante."},{titulo:"Nunca sozinho",subtitulo:"Regra de ouro",texto:"Nunca entrar sozinho em cena de agitação psicomotora. Se a equipe não é suficiente: aguardar reforço. A segurança do socorrista é inegociável."}]},{tipo:"destaque",texto:"Socorrista que foi agredido fisicamente durante atendimento pode e deve registrar boletim de ocorrência. A agressão a profissional de saúde no exercício da função é crime no Brasil (Lei 9.983/2000)."}]}}]},{id:18,titulo:"Animais Peçonhentos",icone:"🐍",status:"disponivel",topicos:[{id:"18.1",titulo:"Serpentes — reconhecimento e conduta",conteudo:{tipo:"texto",intro:"O Brasil é um dos países com maior diversidade de serpentes peçonhentas do mundo. O reconhecimento do gênero e a conduta correta no APH são fundamentais para reduzir complicações.",blocos:[{tipo:"card-grid",cards:[{titulo:"Bothrops (Jararaca)",subtitulo:"Gênero mais comum — 80% dos casos",texto:"Ação proteolítica, coagulante e hemorrágica. Dor e edema local intensos, bolhas, necrose, hemorragia sistêmica. Soro botrópico."},{titulo:"Crotalus (Cascavel)",subtitulo:"Maior letalidade no Brasil",texto:"Ação neurotóxica (fácies miastênica, ptose, diplopia) + miotóxica (urina escura) + coagulante. Soro crotálico."},{titulo:"Lachesis (Surucucu)",subtitulo:"Maior serpente peçonhenta das Américas",texto:"Ação similar ao Bothrops + efeito vagal (bradicardia, hipotensão, diarreia). Soro laquético ou botrópico-laquético."},{titulo:"Micrurus (Coral verdadeira)",subtitulo:"Rara, mas altamente neurotóxica",texto:"Paralisia muscular progressiva, apneia. Soro antielapídico. Sem manifestação local significativa."}]},{tipo:"destaque",texto:"NÃO FAZER: torniquete, corte, sucção, gelo, calor, ingestão de álcool, comprimir o local. FAZER: imobilizar, tranquilizar, transportar para soroterapia."},{tipo:"lista",titulo:"Conduta APH — serpente:",itens:["Garantir segurança da cena — afastar ou matar a serpente se possível (identificação ajuda no tratamento)","Lavar o local com água e sabão suavemente","Imobilizar o membro em posição funcional (abaixo do nível do coração)","Retirar anéis, relógio, pulseiras (edema progressivo)","Acesso venoso e monitorização se disponível","Transporte imediato — soroterapia é o único tratamento eficaz"]}]}},{id:"18.2",titulo:"Escorpiões e aranhas",conteudo:{tipo:"texto",intro:"Escorpiões e aranhas são responsáveis por grande número de acidentes no Brasil, especialmente em zona urbana. A gravidade varia com a espécie, a quantidade de veneno e a idade da vítima.",blocos:[{tipo:"card-grid",cards:[{titulo:"Tityus serrulatus (Escorpião-amarelo)",subtitulo:"Espécie mais perigosa do Brasil",texto:"Dor local intensa, sudorese, taquicardia, vômitos, hipertensão. Em crianças: risco de edema pulmonar e choque. EMERGÊNCIA PEDIÁTRICA."},{titulo:"Loxosceles (Aranha-marrom)",subtitulo:"Loxoscelismo cutâneo e visceral",texto:"Lesão necrótica de evolução lenta (3–7 dias), halo eritematoso, dor moderada inicial. Forma visceral rara: hemólise grave."},{titulo:"Phoneutria (Aranha-armadeira)",subtitulo:"Veneno neurotóxico",texto:"Dor local intensa e imediata, sudorese, taquicardia, priapismo (em homens), agitação. Grave em crianças."},{titulo:"Latrodectus (Viúva-negra)",subtitulo:"Latrodectismo — dor irradiada",texto:"Dor local discreta mas dor muscular intensa e generalizada (cólicas), hipertensão, bradicardia. Soro específico se grave."}]},{tipo:"destaque",texto:"Escorpionismo em criança pequena = EMERGÊNCIA. Toda criança picada por escorpião deve ser avaliada em serviço de saúde, independente dos sintomas iniciais."},{tipo:"lista",titulo:"Conduta geral para escorpiões/aranhas:",itens:["Lavar o local com água e sabão","Analgesia local com gelo (exceto aranha-marrom — pode piorar a necrose)","NÃO espremer, incisar ou sugar o local","Transportar ao serviço de saúde com o animal identificado se possível","Em crianças: transporte imediato independente dos sintomas"]}]}},{id:"18.3",titulo:"Abelhas, vespas e outros insetos",conteudo:{tipo:"texto",intro:"Ferroadas de abelhas e vespas podem causar desde reação local até anafilaxia fatal. O número de ferroadas e a suscetibilidade individual determinam a gravidade.",blocos:[{tipo:"card-grid",cards:[{titulo:"Reação local simples",subtitulo:"1 a poucos ferrões",texto:"Dor, edema e eritema local. Remover o ferrão raspando (não pinçar). Gelo local. Analgésico se necessário."},{titulo:"Reação tóxica por múltiplas picadas",subtitulo:"Geralmente >10 ferrões",texto:"Vômito, diarreia, cefaleia, hipotensão, hemólise. Risco proporcional ao número de ferrões. Tratamento de suporte."},{titulo:"Reação alérgica grave / Anafilaxia",subtitulo:"Independe do número de ferrões",texto:"Urticária generalizada, angioedema, broncoespasmo, hipotensão. ADRENALINA IM imediata. Transporte urgente."},{titulo:"Abelhas africanizadas",subtitulo:"Comportamento defensivo agressivo",texto:"Atacam em enxame. Afastar a vítima da área sem movimentos bruscos. Não usar água para dispersar — piora o ataque."}]},{tipo:"destaque",texto:"Retirar o ferrão por raspagem (cartão, unha) — NUNCA pinçar com pinça ou dedos, pois comprime a bolsa de veneno injetando mais toxina."}]}},{id:"18.4",titulo:"Arraias, peixes e animais marinhos",conteudo:{tipo:"texto",intro:"Acidentes com animais aquáticos são frequentes em regiões litorâneas e de rios do Brasil. O veneno desses animais tem características específicas que orientam o tratamento.",blocos:[{tipo:"card-grid",cards:[{titulo:"Arraias de água doce (Potamotrygon)",subtitulo:"Acidente mais frequente no interior",texto:"Dor excruciante imediata, lesão lacerada pelo espinho, risco de infecção. Mergulhar o membro em água quente (42–45°C) por 30–90 min para inativar o veneno (termolábil)."},{titulo:"Baiacu (intoxicação por tetrodotoxina)",subtitulo:"Por consumo — não por contato",texto:"Paralisia progressiva, insuficiência respiratória. Sem antídoto. Suporte ventilatório e transporte urgente."},{titulo:"Água-viva e corais",subtitulo:"Cnidários",texto:"Dor em queimação local, eritema, urticária. Lavar com água do mar (não doce). Remover tentáculos com objeto (não com as mãos). Vinagre se disponível."},{titulo:"Ouriço-do-mar",subtitulo:"Espinhos quebram na pele",texto:"Dor local, infecção. Mergulhar em água quente. Não tentar retirar os espinhos no APH — risco de quebrar mais."}]},{tipo:"destaque",texto:"Água QUENTE é o tratamento de escolha para venenos de peixes e arraias (termolábeis). Temperatura: 42–45°C. Tempo: 30 a 90 minutos. Cuidado para não queimar a pele."}]}},{id:"18.5",titulo:"Plantas tóxicas e intoxicações naturais",conteudo:{tipo:"texto",intro:"Contato ou ingestão de plantas tóxicas pode causar desde irritação local até falência orgânica. O CIATOX (0800 722 6001) é o principal recurso de apoio.",blocos:[{tipo:"lista",titulo:"Plantas de maior risco no Brasil:",itens:["Comigo-ninguém-pode (Dieffenbachia): cristais de oxalato causam queimação oral intensa, edema de língua, risco de OVACE","Trombeteira/Zabumba (Datura): alcaloides anticolinérgicos — midríase, taquicardia, alucinações, hipertermia","Cássia/Coronha: hepatotóxica — icterícia, falência hepática","Mamona (Ricinus communis): ricina — uma das toxinas mais letais conhecidas","Beladona: atropínicos — síndrome anticolinérgica clássica"]},{tipo:"card-grid",cards:[{titulo:"Síndrome anticolinérgica",subtitulo:"Trombeteira, beladona",texto:"Taquicardia, pele seca e quente, midríase, retenção urinária, agitação, alucinações. 'Seco como um osso, vermelho como beterraba, louco como chapeleiro'."},{titulo:"Conduta geral",subtitulo:"Intoxicação por planta",texto:"Identificar a planta, acionar CIATOX, suporte clínico, transporte. Não induzir vômito sem orientação do toxicologista."}]},{tipo:"destaque",texto:"CIATOX: 0800 722 6001 — disponível 24h, gratuito, orienta condutas em intoxicações exógenas incluindo plantas, medicamentos, produtos químicos e animais peçonhentos."}]}}]},{id:19,titulo:"Tentativa de Autoextermínio",icone:"🆘",status:"disponivel",topicos:[{id:"19.1",titulo:"Abordagem inicial e segurança da cena",conteudo:{tipo:"texto",intro:"O atendimento pré-hospitalar a vítimas de tentativa de autoextermínio (TAE) exige equilíbrio entre a intervenção clínica urgente e a abordagem humanizada. A segurança é sempre o primeiro passo.",blocos:[{tipo:"destaque",texto:"Segurança PRIMEIRO: cenas de TAE podem conter riscos para a equipe — armas, substâncias, estruturas instáveis. Nunca entre em cena insegura."},{tipo:"lista",titulo:"Avaliação de segurança específica em TAE:",itens:["Verificar presença de armas de fogo, facas ou outros objetos cortantes ainda acessíveis","Em intoxicações por gás: nunca entre sem EPI adequado — risco de contaminação","Em enforcamento: verificar estabilidade da estrutura antes de subir","Em TAE por arma de fogo: aguardar liberação policial da cena se necessário","Solicitar apoio policial se houver risco de agressão ou cena não controlada"]},{tipo:"card-grid",cards:[{titulo:"Abordagem com a vítima consciente",subtitulo:"Voz calma, sem julgamento",texto:"Apresente-se. Diga que está ali para ajudar. Não questione a decisão. Ouça. Mantenha contato visual respeitoso."},{titulo:"Privacidade e dignidade",subtitulo:"Direito da vítima",texto:"Afastar curiosos. Cobrir a vítima se necessário. Não comentar a situação em voz alta na frente de terceiros."},{titulo:"Família e acompanhantes",subtitulo:"Atenção ao entorno",texto:"Familiares em estado de choque também precisam de acolhimento. Designar um socorrista para apoiá-los separadamente."},{titulo:"Sigilo profissional",subtitulo:"Ético e legal",texto:"Informações da ocorrência são compartilhadas apenas com a equipe de saúde receptora. Imprensa e curiosos: sem informações."}]}]}},{id:"19.2",titulo:"TAE por intoxicação exógena",conteudo:{tipo:"texto",intro:"A intoxicação medicamentosa ou por substâncias químicas é o método mais frequente de TAE no Brasil, especialmente entre mulheres. A conduta no APH é suporte e transporte rápido.",blocos:[{tipo:"lista",titulo:"Informações essenciais a coletar na cena:",itens:["Que substância(s) foi/foram usadas? (guardar embalagens, blisters, frascos)","Quantidade aproximada ingerida","Horário estimado da ingestão","Sintomas presentes no momento","Uso associado de álcool","Outras tentativas anteriores"]},{tipo:"card-grid",cards:[{titulo:"NÃO induzir vômito",subtitulo:"Contraindicado na maioria dos casos",texto:"Risco de broncoaspiração, lesão química da mucosa esofágica e laríngea. Apenas se orientado pelo CIATOX ou regulação médica."},{titulo:"Carvão ativado",subtitulo:"Somente por orientação médica",texto:"Reduz absorção de algumas substâncias. Contraindicado em inconscientes, cáusticos e hidrocarbonetos. Administrar conforme protocolo."},{titulo:"Via aérea em prioridade",subtitulo:"Vítima com rebaixamento",texto:"Posição lateral de segurança. BVM se apneia. Aspiração de secreções. IOT se disponível e indicada."},{titulo:"Acionar CIATOX",subtitulo:"0800 722 6001",texto:"Orientação especializada 24h para qualquer intoxicação. Informar a substância e quantidade para conduta específica."}]},{tipo:"destaque",texto:"Toda intoxicação em contexto de TAE é notificação compulsória no Brasil — ficha de notificação deve ser preenchida pelo serviço receptor."}]}},{id:"19.3",titulo:"TAE por métodos físicos",conteudo:{tipo:"texto",intro:"Tentativas por enforcamento, ferimentos cortantes, precipitação e outros métodos físicos exigem condutas clínicas específicas combinadas à abordagem humanizada.",blocos:[{tipo:"card-grid",cards:[{titulo:"Enforcamento",subtitulo:"Conduta na cena",texto:"Sustentar o corpo, cortar o laço pelo lado (nunca pelo nó). Deitar com proteção cervical. Avaliar ABCDE. Possível lesão cervical, laríngea e hipóxia grave."},{titulo:"Ferimentos cortantes",subtitulo:"Corte de punho e outros",texto:"Controle de hemorragia com pressão direta. Curativo. Avaliação de estruturas nobres (tendões, vasos). Transporte. Não julgar, não questionar."},{titulo:"Precipitação (queda de altura)",subtitulo:"Politrauma grave",texto:"Abordagem como politraumatizado: XABCDE. Proteção cervical obrigatória. Alta energia — presuma lesões múltiplas mesmo sem sinais externos."},{titulo:"Afogamento intencional",subtitulo:"Resgate com segurança",texto:"Priorize a segurança do socorrista. Ventilações de resgate precoces. Proteção cervical apenas se mecanismo sugerir trauma. RCP se PCR."}]},{tipo:"destaque",texto:"Em TODA TAE por método físico: tratar as lesões com a mesma competência técnica de qualquer trauma. A causa não muda a qualidade do cuidado prestado."}]}},{id:"19.4",titulo:"Aspectos legais, éticos e notificação",conteudo:{tipo:"texto",intro:"O atendimento a vítimas de TAE envolve obrigações legais e éticas específicas que o socorrista deve conhecer.",blocos:[{tipo:"card-grid",cards:[{titulo:"Notificação compulsória",subtitulo:"Lei 13.819/2019 — Política Nacional de Prevenção do Suicídio",texto:"TAE é agravo de notificação compulsória. Serviço receptor preenche a ficha de notificação ao SINAN. APH deve fornecer todas as informações disponíveis."},{titulo:"Recusa de atendimento",subtitulo:"Vítima consciente",texto:"Adulto consciente tem direito de recusar atendimento. Documenta-se a recusa. Comunicar à regulação médica. Não abandonar — manter presença e diálogo."},{titulo:"Menor de idade",subtitulo:"ECA — proteção integral",texto:"Crianças e adolescentes têm proteção especial. Atendimento obrigatório. Notificação ao Conselho Tutelar. Comunicar ao responsável e à regulação."},{titulo:"Documentação",subtitulo:"Ficha de atendimento",texto:"Registrar horário de chegada, condições encontradas, substâncias identificadas, condutas realizadas e estado ao transferir. Sem julgamentos no registro."}]},{tipo:"lista",titulo:"Rede de apoio — encaminhamento pós-APH:",itens:["CVV — Centro de Valorização da Vida: 188 (24h, gratuito)","CAPS — Centro de Atenção Psicossocial: referência para saúde mental no território","UPA/PA: avaliação clínica e psiquiátrica de urgência","Hospital geral com psiquiatria: casos de maior gravidade","Conselho Tutelar: quando envolver criança ou adolescente"]},{tipo:"destaque",texto:"O APH não termina com a entrega da vítima no hospital. A qualidade do registro e do relato verbal para a equipe receptora influencia diretamente o plano de cuidados da vítima."}]}},{id:"19.5",titulo:"Cuidado com o cuidador — saúde do socorrista",conteudo:{tipo:"texto",intro:"Atendimentos de TAE e situações de morte violenta geram impacto emocional significativo na equipe. O cuidado com a saúde mental do socorrista é parte integrante do protocolo.",blocos:[{tipo:"card-grid",cards:[{titulo:"Estresse pós-traumático no socorrista",subtitulo:"É real e frequente",texto:"Pesadelos, flashbacks, irritabilidade, dificuldade de concentração. Até 30% dos profissionais de emergência desenvolvem TEPT ao longo da carreira."},{titulo:"Debriefing",subtitulo:"Conversa estruturada pós-ocorrência",texto:"Reunião da equipe para processar o ocorrido. Não é terapia — é suporte mútuo e identificação de quem precisa de apoio especializado."},{titulo:"Sinais de alerta",subtitulo:"Quando buscar ajuda",texto:"Sonhos recorrentes sobre atendimentos, evitar o trabalho, uso de álcool para 'desligar', choro frequente, isolamento social."},{titulo:"Onde buscar apoio",subtitulo:"Recursos disponíveis",texto:"Psicólogo do trabalho, CAPS, médico do trabalho, CVV (188). Falar é o primeiro passo — não existe fraqueza em pedir ajuda."}]},{tipo:"destaque",texto:"Socorrista que cuida de si cuida melhor dos outros. Reconhecer seus próprios limites emocionais é um ato de profissionalismo, não de fraqueza."}]}}]},{id:20,titulo:"Gestante em Situação de Emergência",icone:"🤰",status:"disponivel",topicos:[{id:"20.1",titulo:"Adaptações fisiológicas da gestação no APH",conteudo:{tipo:"texto",intro:"A gestante é uma vítima especial no APH. As adaptações fisiológicas da gestação modificam a apresentação clínica das emergências e exigem condutas específicas do socorrista.",blocos:[{tipo:"card-grid",cards:[{titulo:"Sistema cardiovascular",subtitulo:"Volume sanguíneo aumentado 40-50%",texto:"A gestante pode perder até 30% do volume sanguíneo antes de apresentar hipotensão visível — o útero gravídico compensa. Sinais de choque aparecem TARDE na gestante."},{titulo:"Síndrome da hipotensão supina",subtitulo:"Útero comprime veia cava",texto:"Em decúbito dorsal, o útero grávido comprime a veia cava inferior, reduzindo o retorno venoso e causando hipotensão. Solução: deslocar o útero manualmente para a esquerda ou inclinar 15-30° para a esquerda."},{titulo:"Sistema respiratório",subtitulo:"Consumo de O2 aumentado",texto:"A gestante consome mais oxigênio e tolera menos tempo de apneia. Hipóxia materna compromete rapidamente o feto. O2 suplementar é indicado mesmo com SpO2 normal em gestantes em emergência."},{titulo:"Estômago cheio",subtitulo:"Risco de broncoaspiração",texto:"O útero comprime o estômago, retardando o esvaziamento gástrico. A gestante tem risco aumentado de vômito e broncoaspiração — atenção especial na abertura de via aérea."}]},{tipo:"destaque",texto:"REGRA DE OURO: Tratar a mãe é tratar o bebê. A melhor intervenção para o feto é a estabilização clínica adequada da mãe. Não existe situação em que tratar o feto é prioridade sobre tratar a mãe."}]}},{id:"20.2",titulo:"Posicionamento e manobras na gestante",conteudo:{tipo:"texto",intro:"O posicionamento da gestante no APH é diferente do padrão. Errar o posicionamento pode agravar o quadro clínico e comprometer a perfusão fetal.",blocos:[{tipo:"card-grid",cards:[{titulo:"Posição de transporte padrão",subtitulo:"Decúbito lateral ESQUERDO",texto:"Sempre que possível, transportar a gestante em decúbito lateral esquerdo — alivia a compressão da veia cava e melhora o retorno venoso. Alternativa: inclinação de 15-30° para a esquerda com coxim sob o quadril direito."},{titulo:"Na prancha longa",subtitulo:"Imobilização com adaptação",texto:"Fixar a gestante na prancha normalmente com os cintos. Após fixar, colocar um coxim ou manta enrolada sob o lado direito da prancha — isso cria a inclinação para a esquerda necessária."},{titulo:"RCP na gestante",subtitulo:"Adaptações obrigatórias",texto:"Deslocar manualmente o útero para a esquerda (uma pessoa segura o útero enquanto outra faz compressões). Compressões no mesmo ponto (centro do esterno). Se PCR >4 min sem RCES: comunicar regulação para cesariana de emergência."},{titulo:"Trauma em gestante",subtitulo:"XABCDE com atenção ao útero",texto:"Avaliar útero: tônus, contrações, sangramento vaginal. Monitorar frequência cardíaca fetal se estetoscópio disponível. Sempre imobilizar a coluna em mecanismo de alta energia."}]},{tipo:"lista",titulo:"O que NUNCA fazer na gestante no APH:",itens:["Deixar em decúbito dorsal por tempo prolongado — síndrome de hipotensão supina","Ignorar sangramento vaginal — pode ser descolamento prematuro de placenta (emergência)","Administrar medicamentos sem orientação médica — risco fetal","Subestimar a gravidade porque 'parece bem' — a gestante compensa e deteriora rapidamente","Pressionar o abdome para avaliar o feto — risco de descolamento de placenta"]}]}},{id:"20.3",titulo:"Emergências obstétricas no APH",conteudo:{tipo:"texto",intro:"Algumas emergências são exclusivas ou mais frequentes na gestação. O socorrista precisa reconhecê-las e agir com rapidez.",blocos:[{tipo:"card-grid",cards:[{titulo:"Pré-eclâmpsia / Eclâmpsia",subtitulo:"Hipertensão + convulsão",texto:"PA >140x90 + proteinúria = pré-eclâmpsia. Se convulsionar = eclâmpsia. CONDUTA: decúbito lateral, O2, acesso venoso, sulfato de magnésio (SAV), transporte urgente. NÃO usar anti-hipertensivo sem orientação médica."},{titulo:"Descolamento Prematuro de Placenta",subtitulo:"Emergência hemorrágica",texto:"Dor abdominal intensa e súbita, útero rígido, sangramento vaginal escuro (pode ser ausente). Choque hemorrágico de rápida evolução. Transporte imediato — tratamento é cirúrgico."},{titulo:"Placenta Prévia",subtitulo:"Sangramento sem dor",texto:"Sangramento vaginal vermelho vivo sem dor abdominal em gestante. Não realizar toque vaginal. Transporte imediato em decúbito lateral esquerdo."},{titulo:"Parto de Emergência",subtitulo:"Quando não há tempo para o hospital",texto:"Se coroamento visível: não tentar impedir. Amparar a cabeça, não puxar. Limpar boca e nariz do RN. Secar e aquecer. Aguardar dequitação espontânea da placenta. Não cortar o cordão sem material estéril."}]},{tipo:"destaque",texto:"Em qualquer emergência obstétrica: comunicar imediatamente à regulação médica, informar idade gestacional estimada, presença de sangramento, dor e nível de consciência da gestante."}]}},{id:"20.4",titulo:"RCP em gestante — protocolo atualizado AHA 2025",conteudo:{tipo:"texto",intro:"A RCP em gestante segue o protocolo padrão com adaptações obrigatórias. Cada minuto sem RCES reduz drasticamente a sobrevida materna e fetal.",blocos:[{tipo:"lista",titulo:"Sequência de RCP em gestante — AHA 2025:",itens:["1. Reconhecer a PCR — inconsciência + ausência de respiração normal","2. Acionar socorro (192) e comunicar que é gestante","3. Posicionar: decúbito dorsal — UM socorrista desloca manualmente o útero para a esquerda","4. Iniciar compressões torácicas no mesmo ponto (metade inferior do esterno) — frequência 100-120/min","5. Ventilar conforme protocolo padrão","6. DEA assim que disponível — usar normalmente","7. Se >4 minutos sem RCES: comunicar regulação para considerar cesariana perimortem","8. Não interromper a RCP durante o procedimento cirúrgico se necessário"]},{tipo:"card-grid",cards:[{titulo:"Deslocamento uterino manual",subtitulo:"Técnica correta",texto:"Com as duas mãos, desloc
