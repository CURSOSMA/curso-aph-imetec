rigar o atendimento","Atender à força para não ser responsabilizado"],correta:1},{id:3,enunciado:"Em caso de menor de idade sem responsável presente com necessidade de atendimento urgente:",opcoes:["Aguardar responsável antes de qualquer intervenção","Atender com base no princípio da beneficência e comunicar ao Conselho Tutelar","Não atender — risco legal para o socorrista","Apenas estabilizar e aguardar ordem judicial"],correta:1},{id:4,enunciado:"O sigilo profissional no APH determina que informações da ocorrência sejam compartilhadas:",opcoes:["Com qualquer familiar presente na cena","Apenas com a equipe de saúde receptora e conforme necessidade clínica","Com a imprensa se houver interesse público","Com vizinhos que pedirem informação"],correta:1},{id:5,enunciado:"A Resolução COFEN 564/2017 (Código de Ética de Enfermagem) determina que o profissional:",opcoes:["Pode recusar atendimento em qualquer situação de risco","Deve prestar assistência de enfermagem sem discriminação de qualquer natureza","Atua exclusivamente sob ordens médicas sem autonomia própria","É isento de responsabilidade em emergências pré-hospitalares"],correta:1},{id:6,enunciado:"A recusa de atendimento documentada deve conter:",opcoes:["Apenas o nome da vítima","Identificação, informações sobre riscos explicados, assinatura da vítima e testemunhas se possível","Somente a assinatura do médico regulador","Diagnóstico definitivo antes da recusa"],correta:1},{id:7,enunciado:"Em vítima inconsciente sem responsável, o princípio ético que justifica o atendimento é:",opcoes:["Autonomia","Justiça","Beneficência e não-maleficência","Equidade"],correta:2},{id:8,enunciado:"O socorrista que atende vítima contra sua vontade expressa (exceto incapazes) pode responder por:",opcoes:["Nada — estará protegido pelo dever de assistência","Constrangimento ilegal e lesão corporal","Apenas infração ética sem consequência penal","Abandono de incapaz"],correta:1},{id:9,enunciado:"Tentativa de autoextermínio em vítima con e sono"],correta:1},{id:3,enunciado:"Antes de qualquer intervenção em vítima agitada, deve-se:",opcoes:["Imobilizar fisicamente para garantir segurança","Garantir segurança da cena, equipe e vítima — avaliar causa orgânica reversível","Administrar sedativo imediatamente","Chamar a polícia e aguardar"],correta:1},{id:4,enunciado:"Causas orgânicas reversíveis de agitação que devem ser descartadas:",opcoes:["Apenas uso de drogas","Hipoglicemia, hipóxia, TCE, intoxicações, infecções graves (sepse), distúrbios metabólicos","Apenas distúrbios psiquiátricos","Hipertensão arterial isolada"],correta:1},{id:5,enunciado:"A contenção física de vítima agitada no APH deve ser:",opcoes:["Realizada por um socorrista para não intimidar","Com número suficiente de pessoas (mínimo 4-5), posição de decúbito dorsal com membros imobilizados","Em posição prona (barriga para baixo) por maior segurança","Evitada em qualquer situação"],correta:1},{id:6,enunciado:"Contenção em posição prona (barriga para baixo) em agitado é:",opcoes:["A posição mais segura para a equipe","Contraindicada — risco de morte por asfixia posicional","Indicada em usuários de drogas","Recomendada se a contenção dorsal falhar"],correta:1},{id:7,enunciado:"Síndrome de excitação aguda (Excited Delirium Syndrome — ExDS) caracteriza-se por:",opcoes:["Depressão e bradipneia","Agitação extrema, hipertermia, força supra-normal, insensibilidade à dor — alto risco de PCR súbita","Apenas alucinações visuais","Bradicardia e hipotensão"],correta:1},{id:8,enunciado:"A comunicação com vítima agitada consciente deve ser:",opcoes:["Autoritária e em voz alta para mostrar controle","Calma, clara, respeitosa e não ameaçadora — estabelecer rapport antes de qualquer intervenção física","Técnica e fria para não criar vínculo","Evitada — qualquer fala pode piorar a agitação"],correta:1},{id:9,enunciado:"Após contenção física de vítima agitada, o monitoramento deve incluir:",opcoes:["Apenas verificação de pulso na chegada ao hospital","Monitorização contínua de sinais vitais, nível de consciência, coloração e respiração durante todo o transporte","Observação apenas visual sem contato físico","Verificação de sinais vitais a cada 30 minutos"],correta:1},{id:10,enunciado:"Sedação farmacológica em vítima agitada no APH:",opcoes:["Pode ser realizada por qualquer membro da equipe","É prerrogativa médica ou conforme protocolo regulado — administração sem prescrição é prática ilegal","É sempre contraindicada no ambiente pré-hospitalar","Deve ser feita antes de qualquer tentativa de comunicação"],correta:1}]},18:{titulo:"Avaliação — Módulo 18: Animais Peçonhentos",questoes:[{id:1,enunciado:"Conduta CORRETA após picada de serpente no APH:",opcoes:["Torniquete acima da picada","Incisar e sugar o local","Imobilizar o membro e transportar para soroterapia","Gelo diretamente no local"],correta:2},{id:2,enunciado:"Soro antiofídico é administrado:",opcoes:["Na cena pelo socorrista","No serviço de saúde com capacidade para tratar reações adversas","Apenas por intensivista","Só com certeza da espécie"],correta:1},{id:3,enunciado:"Bothrops (jararaca) causa principalmente:",opcoes:["Paralisia e ptose palpebral","Ação coagulante, necrosante e hemorrágica","Neurotoxicidade pura","Hemólise sem alteração local"],correta:1},{id:4,enunciado:"Picada de escorpião em criança pequena é:",opcoes:["Sempre baixo risco","Emergência médica com risco de morte","Urgência apenas com dor intensa","Risco só se for escorpião preto"],correta:1},{id:5,enunciado:"Aranha-marrom (Loxosceles): sinal característico:",opcoes:["Dor imediata intensa e paralisia","Lesão necrótica de evolução lenta com halo avermelhado","Convulsão e PCR","Hematomas generalizados"],correta:1},{id:6,enunciado:"NÃO deve ser realizado em picada de serpente:",opcoes:["Imobilizar o membro","Manter em repouso","Torniquete, corte ou sucção","Comunicar SAMU"],correta:2},{id:7,enunciado:"Serpente de maior letalidade no Brasil:",opcoes:["Jararaca (Bothrops)","Surucucu (Lachesis)","Cascavel (Crotalus)","Coral (Micrurus)"],correta:2},{id:8,enunciado:"Picada de abelha com anafilaxia:",opcoes:["Retirar ferrão e aguardar","Adrenalina IM + acesso venoso + transporte imediato","Anti-histamínico oral e observar 1h","Corticoide IM como 1ª escolha"],correta:1},{id:9,enunciado:"CIATOX:",opcoes:["192","190","0800 722 6001","0800 644 6001"],correta:2},{id:10,enunciado:"Arraias de água doce: tratamento específico:",opcoes:["Gelo direto no local","Mergulhar em água quente (42-45°C) por 30-90 min — veneno termolábil","Torniquete proximal","Aspiração do veneno com seringa"],correta:1}]},20:{titulo:"Avaliação — Módulo 20: Gestante em Situação de Emergência",questoes:[{id:1,enunciado:"A síndrome da hipotensão supina na gestante ocorre por:",opcoes:["Hipertensão arterial crônica","Compressão da veia cava pelo útero em decúbito dorsal","Aumento do volume plasmático","Compressão da aorta pelo feto"],correta:1},{id:2,enunciado:"Como deve ser transportada a gestante instável no APH?",opcoes:["Decúbito dorsal plano","Decúbito lateral direito","Decúbito lateral esquerdo ou inclinada 15-30° para a esquerda","Semi-sentada a 45°"],correta:2},{id:3,enunciado:"Na RCP em gestante, o deslocamento uterino manual serve para:",opcoes:["Facilitar as compressões torácicas","Reduzir compressão da veia cava e melhorar o retorno venoso","Proteger o feto durante as compressões","Avaliar os batimentos fetais"],correta:1},{id:4,enunciado:"Eclâmpsia é definida por:",opcoes:["Hipertensão isolada na gestação","Pré-eclâmpsia com evolução para convulsão","Diabetes gestacional com convulsão","Hemorragia com convulsão"],correta:1},{id:5,enunciado:"Em parto de emergência no APH, quando o coroamento é visível:",opcoes:["Tentar impedir o parto e transportar imediatamente","Amparar a cabeça sem puxar e preparar para receber o bebê","Realizar episiotomia para facilitar o parto","Realizar compressão abdominal para acelerar o parto"],correta:1},{id:6,enunciado:"O cinto de segurança na gestante deve ser posicionado:",opcoes:["Sobre o abdome para proteger o útero","Abaixo do abdome sobre as espinhas ilíacas, com cinto diagonal entre as mamas","Apenas o cinto diagonal, sem o abdominal","Não deve usar cinto — risco para o feto"],correta:1},{id:7,enunciado:"Sangramento vaginal vermelho vivo sem dor abdominal em gestante sugere:",opcoes:["Descolamento prematuro de placenta","Placenta prévia","Ruptura uterina","Trabalho de parto normal"],correta:1},{id:8,enunciado:"Na gestante em PCR, quando considerar cesariana perimortem no APH?",opcoes:["Imediatamente ao reconhecer a PCR","Após 4 minutos sem retorno da circulação espontânea","Após 10 minutos de RCP sem sucesso","Apenas no hospital, nunca no APH"],correta:1},{id:9,enunciado:"A gestante tolera menos hipóxia porque:",opcoes:["Tem volume sanguíneo reduzido","Consome mais oxigênio e tem menor reserva — hipóxia compromete rapidamente o feto","Tem frequência respiratória reduzida","O útero comprime os pulmões"],correta:1},{id:10,enunciado:"Após trauma leve em gestante, ela deve:",opcoes:["Ir para casa se não houver dor abdominal","Ser avaliada no hospital com monitorização fetal por pelo menos 4-6 horas","Aguardar surgimento de sintomas antes de buscar atendimento","Fazer repouso domiciliar por 24 horas"],correta:1}]},21:{titulo:"Avaliação — Módulo 21: Lei Lucas e APH em Ambiente Escolar",questoes:[{id:1,enunciado:"A Lei Lucas (Lei nº 13.722/2018) torna obrigatória:",opcoes:["A presença de médico em todas as escolas","Capacitação em primeiros socorros de professores e funcionários de escolas de educação básica","A instalação de DEA em todas as escolas","Treinamento apenas de professores de educação física"],correta:1},{id:2,enunciado:"O nome 'Lei Lucas' homenageia:",opcoes:["Lucas, médico pioneiro do SAMU brasileiro","Lucas Begalli, criança que morreu engasgada em escola de Campinas em 2017","Lucas, deputado autor do projeto de lei","Lucas, bombeiro que salvou uma criança engasgada"],correta:1},{id:3,enunciado:"Em lactente (<1 ano) com OVACE grave, a manobra correta é:",opcoes:["Manobra de Heimlich abdominal igual ao adulto","5 golpes interescapulares + 5 compressões torácicas, alternados","Apenas compressões torácicas sem golpes nas costas","Hiperextensão da cabeça e ventilação forçada"],correta:1},{id:4,enunciado:"Ao chegar em ocorrência em escola, o socorrista deve:",opcoes:["Ignorar os professores e focar exclusivamente na vítima","Ouvir rapidamente o professor que acompanhou o incidente — ele é fonte de informação essencial","Solicitar que todos saiam da sala antes de qualquer avaliação","Aguardar os pais antes de iniciar o atendimento"],correta:1},{id:5,enunciado:"Em criança com suspeita de maus-tratos identificada durante atendimento em escola:",opcoes:["Manter sigilo para não expor a família","Registrar objetivamente e comunicar à regulação médica e ao Conselho Tutelar","Questionar a criança detalhadamente sobre o que aconteceu","Aguardar confirmação médica antes de qualquer notificação"],correta:1},{id:6,enunciado:"Convulsão febril em criança na escola — conduta correta:",opcoes:["Colocar objeto na boca para proteger a língua","Imobilizar a criança durante a crise","Proteger de lesões, posição lateral após a crise, verificar temperatura, acionar SAMU","Administrar antitérmico durante a crise"],correta:2},{id:7,enunciado:"O Programa Saúde na Escola (PSE) permite que a equipe de APH/ESF:",opcoes:["Substitua os professores nas capacitações obrigatórias da Lei Lucas","Integre ações de primeiros socorros, capacite funcionários e realize simulados nas escolas","Instale equipamentos médicos permanentes nas escolas","Faça triagem médica de todos os alunos anualmente"],correta:1},{id:8,enunciado:"Em criança transportada para o hospital sem responsável presente, o socorrista deve:",opcoes:["Aguardar os pais chegarem antes de transportar","Registrar na ficha e comunicar à regulação — transporte não pode ser impedido em emergência","Solicitar autorização judicial para o transporte","Deixar a criança na escola e chamar o Conselho Tutelar"],correta:1},{id:9,enunciado:"Qual o número correto para acionar o socorro em emergência escolar?",opcoes:["190 — Polícia Militar","192 — SAMU ou 193 — Bombeiros","197 — Disque Denúncia","180 — Central de Atendimento à Mulher"],correta:1},{id:10,enunciado:"A Lei Lucas abrange:",opcoes:["Apenas escolas públicas","Apenas escolas privadas com mais de 500 alunos","Escolas públicas e privadas de educação básica (creche ao ensino médio)","Apenas escolas que tenham histórico de acidentes"],correta:2}]},19:{titulo:"Avaliação — Módulo 19: Tentativa de Autoextermínio",questoes:[{id:1,enunciado:"PRIMEIRA prioridade no atendimento a vítima de TAE:",opcoes:["Identificar o método","Garantir segurança da cena e socorristas","Perguntar o motivo à vítima","ABCDE antes da segurança"],correta:1},{id:2,enunciado:"Indução de vômito em intoxicação por TAE:",opcoes:["Recomendada sempre","Contraindicada — risco de broncoaspiração e lesão química","Indicada para comprimidos","Obrigatória se consciente"],correta:1},{id:3,enunciado:"Abordagem comunicacional com vítima de TAE consciente:",opcoes:["Interrogatória e diretiva","Empática, sem julgamento, escuta ativa, voz calma","Focada em convencer que errou","Evitar qualquer conversa"],correta:1},{id:4,enunciado:"TAE por enforcamento com vítima suspensa:",opcoes:["Cortar o laço e deixar cair","Sustentar o corpo, cortar o laço pelo lado, deitar com proteção cervical","Aguardar apoio policial","DEA imediato ao retirar"],correta:1},{id:5,enunciado:"Informação ESSENCIAL na cena de TAE por intoxicação:",opcoes:["Cor dos olhos e tipo sanguíneo","Nome e quantidade da substância, horário e sintomas","Histórico familiar psiquiátrico","Apenas nome da vítima"],correta:1},{id:6,enunciado:"Carvão ativado no APH em TAE oral:",opcoes:["Administrado por qualquer socorrista em toda intoxicação","Contraindicado em inconscientes ou com risco de aspiração","Antídoto universal","Dado antes de qualquer outro suporte"],correta:1},{id:7,enunciado:"Notificação de TAE ao SINAN é:",opcoes:["Opcional","Obrigatória — notificação compulsória no Brasil","Restrita a casos com óbito","Só quando família autoriza"],correta:1},{id:8,enunciado:"TAE por ferimento cortante em punho: conduta prioritária:",opcoes:["Conversar antes de qualquer intervenção","Controle imediato da hemorragia respeitando dignidade da vítima","Torniquete em qualquer laceração de punho","Aguardar consentimento"],correta:1},{id:9,enunciado:"Sigilo em TAE no APH:",opcoes:["Compartilhar com qualquer familiar","Sigilo profissional — só com equipe de saúde receptora","Imprensa pode ser informada","Vizinhos têm direito à informação"],correta:1},{id:10,enunciado:"Após estabilização clínica de vítima de TAE:",opcoes:["Alta se sinais vitais estáveis","Avaliação psiquiátrica obrigatória antes da alta","Retorno ao domicílio com ansiolítico","Internação compulsória sempre"],correta:1}]}},Ro=[{id:1,titulo:"Introdução ao APH",icone:"🚑",status:"disponivel",topicos:[{id:"1.1",titulo:"O que é o APH?",conteudo:{tipo:"texto",intro:"O Atendimento Pré-Hospitalar (APH) é todo e qualquer cuidado prestado à vítima fora do ambiente hospitalar, com o objetivo de estabilizar seu estado clínico e garantir transporte seguro até a unidade de saúde.",blocos:[{tipo:"destaque",texto:"APH começa quando o socorro é acionado e termina quando a vítima é entregue ao serviço de saúde receptor."},{tipo:"paragrafo",texto:"O APH não se limita apenas ao transporte da vítima. Envolve avaliação rápida da cena, identificação de riscos, prestação de primeiros cuidados e comunicação com a regulação médica — tudo isso integrado e simultâneo."},{tipo:"lista",titulo:"O APH abrange:",itens:["Atendimento em acidentes de trânsito, afogamentos, traumas e emergências clínicas","Suporte básico e avançado de vida","Triagem em desastres e eventos com múltiplas vítimas","Regulação médica e transporte inter-hospitalar"]},{tipo:"paragrafo",texto:"A qualidade do APH influencia diretamente a sobrevida e a recuperação da vítima. Intervenções rápidas e corretas nos primeiros minutos — a chamada 'hora de ouro' — podem ser decisivas entre a vida e a morte."}]}},{id:"1.1",titulo:"Primeiros Socorros vs. APH — qual a diferença?",conteudo:{tipo:"texto",intro:"Antes de qualquer conteúdo técnico, é fundamental entender onde o APH começa e onde os primeiros socorros terminam. Muita confusão existe entre os dois conceitos — e confundir pode custar uma vida.",blocos:[{tipo:"card-grid",cards:[{titulo:"Primeiros Socorros",subtitulo:"Qualquer pessoa pode realizar",texto:"Conjunto de ações imediatas prestadas por qualquer pessoa — leigo ou profissional — à vítima de agravo à saúde, antes da chegada do socorro especializado. Ex: Heimlich, RCP básica, curativo simples, posição de recuperação."},{titulo:"APH — Atendimento Pré-Hospitalar",subtitulo:"Profissionais treinados e regulados",texto:"Sistema organizado de atendimento fora do hospital, com equipe treinada, equipamentos específicos, regulação médica e protocolos definidos. Vai além dos primeiros socorros — inclui avaliação clínica, procedimentos invasivos e transporte seguro."}]},{tipo:"lista",titulo:"O que diferencia o APH dos Primeiros Socorros:",itens:["Regulação médica: o APH tem um médico regulador orientando as condutas à distância — os primeiros socorros não","Equipe e equipamentos: ambulância equipada, oxigênio, DEA, acesso venoso, medicamentos","Protocolos definidos: XABCDE, SAMPLE, triagem START — procedimentos sistematizados e baseados em evidências","Responsabilidade legal: o socorrista do APH responde legalmente pelas condutas realizadas","Transporte qualificado: não é apenas 'levar ao hospital' — é atender durante o trajeto"]},{tipo:"destaque",texto:"Resumo: Primeiros Socorros é o que qualquer pessoa faz nos primeiros momentos. APH é o sistema profissional que chega depois e continua o cuidado até o hospital. Um não substitui o outro — são elos da mesma cadeia de sobrevivência."},{tipo:"card-grid",cards:[{titulo:"Quando os Primeiros Socorros salvam",subtitulo:"Os primeiros minutos são críticos",texto:"A maioria das mortes evitáveis por trauma ocorre nos primeiros minutos. Um leigo que sabe fazer RCP ou controlar hemorragia pode salvar uma vida ANTES da ambulância chegar."},{titulo:"Quando o APH é insubstituível",subtitulo:"Além do alcance do leigo",texto:"Intubação, acesso venoso, desfibrilação com monitor, medicamentos vasoativos, imobilização de coluna — são procedimentos que exigem treinamento profissional e equipamentos específicos."}]}]}},{id:"1.2",titulo:"História e evolução do APH",conteudo:{tipo:"timeline",intro:"O APH moderno não surgiu do nada. Sua história é marcada por guerras, catástrofes e a busca constante por salvar mais vidas.",eventos:[{ano:"1792",titulo:"Larrey e as ambulâncias voadoras",descricao:"O cirurgião francês Dominique Jean Larrey criou as primeiras ambulâncias militares durante as guerras napoleônicas, levando o socorro ao campo de batalha."},{ano:"1865",titulo:"Guerra Civil Americana",descricao:"Jonathan Letterman sistematizou o transporte de feridos, criando um modelo de triagem e evacuação que influencia o APH até hoje."},{ano:"1966",titulo:"Relatório Acidental Death and Disability (EUA)",descricao:"Documento que expôs as deficiências no APH e impulsionou a criação dos primeiros serviços de emergência médica modernos nos EUA."},{ano:"1995",titulo:"Primeiro SAMU do Brasil — Porto Alegre/RS",descricao:"O primeiro Serviço de Atendimento Móvel de Urgência do Brasil foi implantado em Porto Alegre (RS) em 1995, inspirado no modelo francês SAMU 15. A regulamentação nacional pelo Ministério da Saúde veio em 2003, com a Portaria 1.864."},{ano:"2003",titulo:"Política Nacional de Atenção às Urgências",descricao:"O Brasil institui a PNAU, integrando SAMU, UPAs e hospitais em uma rede de atenção às urgências — modelo vigente até hoje."}]}},{id:"1.3",titulo:"Responsabilidade legal e omissão de socorro",conteudo:{tipo:"texto",intro:"O APH é regido por leis que estabelecem deveres e responsabilidades para profissionais e cidadãos. Conhecer esse arcabouço é parte essencial da formação do socorrista.",blocos:[{tipo:"card-grid",cards:[{titulo:"Art. 135 do Código Penal",subtitulo:"Omissão de socorro",texto:"Deixar de prestar assistência a vítima em perigo é crime, punível com detenção de 1 a 6 meses ou multa. Agravado se o omitente é profissional de saúde."},{titulo:"Código de Ética — COFEN 564/2017",subtitulo:"Obrigação ética do enfermeiro/técnico",texto:"Proíbe recusa injustificada de assistência em situação de urgência. O profissional responde ética, civil e penalmente por omissão."},{titulo:"CFM — Resolução 2.059/2013",subtitulo:"Regulamentação médica no APH",texto:"Define o papel do médico regulador, a obrigatoriedade de regulação médica no SAMU e os protocolos de intervenção à distância."},{titulo:"Lei 9.654/1998",subtitulo:"Profissão de Enfermagem",texto:"Regulamenta o exercício da enfermagem. O técnico atua em nível médio, sob supervisão do enfermeiro, dentro do escopo legal definido."}]},{tipo:"destaque",texto:"O técnico de enfermagem no APH atua SEMPRE sob supervisão e protocolo. Ações fora do escopo legal geram responsabilidade civil, penal e ética."},{tipo:"lista",titulo:"Responsabilidade no APH:",itens:["Civil: obrigação de indenizar danos causados por imperícia, imprudência ou negligência","Penal: crimes como omissão de socorro, lesão corporal culposa ou dolosa","Ética: processo no COREN com penalidades que vão de advertência à cassação do registro","Administrativa: sanções institucionais pelo descumprimento de protocolos"]}]}},{id:"1.4",titulo:"Cadeia de sobrevivência",conteudo:{tipo:"texto",intro:"A cadeia de sobrevivência representa os elos sequenciais que, quando bem executados, maximizam as chances de sobrevida da vítima.",blocos:[{tipo:"cadeia",elos:[{numero:1,titulo:"Reconhecimento precoce",icone:"👁️",cor:"#e53e3e",descricao:"Identificar rapidamente sinais de emergência e acionar o socorro"},{numero:2,titulo:"Chamada de emergência",icone:"📞",cor:"#dd6b20",descricao:"Acionar o SAMU (192) ou Bombeiros (193) imediatamente"},{numero:3,titulo:"RCP precoce",icone:"🤲",cor:"#d69e2e",descricao:"Iniciar ressuscitação cardiopulmonar de qualidade sem demora"},{numero:4,titulo:"Desfibrilação precoce",icone:"⚡",cor:"#38a169",descricao:"Uso do DEA o mais rápido possível nos casos de FV/TV sem pulso"},{numero:5,titulo:"Suporte avançado de vida",icone:"🏥",cor:"#3182ce",descricao:"Intervenção médica com medicamentos, via aérea avançada e monitorização"},{numero:6,titulo:"Cuidados pós-PCR",icone:"💊",cor:"#805ad5",descricao:"Cuidados intensivos após retorno da circulação espontânea"}]},{tipo:"paragrafo",texto:"Cada elo da cadeia depende do anterior. A ausência ou atraso em qualquer etapa compromete o resultado final."}]}},{id:"1.5",titulo:"Papéis na equipe de APH",conteudo:{tipo:"texto",intro:"O APH é trabalho em equipe. Cada membro tem papel definido, e a eficiência depende da comunicação e clareza de funções.",blocos:[{tipo:"equipe",membros:[{cargo:"Médico Regulador",icone:"👨‍⚕️",cor:"#3182ce",responsabilidades:["Gerencia a central de regulação médica","Autoriza e orienta o despacho de recursos","Orienta condutas via rádio/telefone","Define o destino da vítima"]},{cargo:"Enfermeiro",icone:"🧑‍⚕️",cor:"#38a169",responsabilidades:["Lidera o atendimento clínico na cena","Realiza procedimentos de alta complexidade","Coordena a equipe assistencial","Documenta e comunica com a regulação"]},{cargo:"Técnico de Enfermagem",icone:"👩‍⚕️",cor:"#d69e2e",responsabilidades:["Auxilia sob supervisão do enfermeiro","Realiza procedimentos dentro de seu escopo","Controla materiais e equipamentos","Suporte durante o transporte"]},{cargo:"Condutor Socorrista",icone:"🚗",cor:"#805ad5",responsabilidades:["Condução segura da ambulância","Manutenção básica do veículo","Apoio ao atendimento na cena","Comunicação com a central"]}]},{tipo:"destaque",texto:"No APH, hierarquia salva vidas. Discussões na cena comprometem o atendimento. Conflitos são resolvidos depois."}]}}]},{id:2,titulo:"Legislação, Ética e Recusa de Atendimento",icone:"⚖️",status:"disponivel",topicos:[{id:"2.1",titulo:"Marco legal do APH no Brasil",conteudo:{tipo:"texto",intro:"O APH no Brasil é sustentado por um arcabouço legal que define responsabilidades, direitos e deveres de todos os envolvidos — profissionais, pacientes e instituições.",blocos:[{tipo:"card-grid",cards:[{titulo:"Lei 8.080/1990",subtitulo:"Lei Orgânica da Saúde",texto:"Base do SUS. Define organização do sistema de saúde e as ações de urgência e emergência como dever do Estado."},{titulo:"Portaria MS 1.863/2003",subtitulo:"PNAU",texto:"Institui a Política Nacional de Atenção às Urgências com o SAMU 192 como componente central."},{titulo:"Portaria MS 2.048/2002",subtitulo:"Regulamento Técnico",texto:"Define padrões para funcionamento, recursos humanos e tipos de ambulâncias dos sistemas de urgência."},{titulo:"Res. COFEN 564/2017",subtitulo:"Código de Ética de Enfermagem",texto:"Regula condutas éticas do enfermeiro e técnico nas ações de urgência, garantindo assistência sem discriminação."}]},{tipo:"destaque",texto:"O profissional que abandona vítima em situação de risco pode responder por omissão de socorro (Art. 135 do Código Penal), independente de ser socorrista profissional ou cidadão comum."}]}},{id:"2.2",titulo:"Princípios bioéticos no APH",conteudo:{tipo:"texto",intro:"Os quatro princípios da bioética guiam as decisões clínicas e éticas em todas as situações de atendimento pré-hospitalar.",blocos:[{tipo:"cadeia",elos:[{numero:1,titulo:"Autonomia",icone:"🙋",cor:"#3182ce",descricao:"Respeitar a capacidade do paciente de tomar decisões informadas sobre seu próprio cuidado."},{numero:2,titulo:"Beneficência",icone:"💚",cor:"#38a169",descricao:"Agir sempre em benefício do paciente — fazer o bem."},{numero:3,titulo:"Não-maleficência",icone:"🛡️",cor:"#d69e2e",descricao:"Não causar dano desnecessário. 'Primum non nocere' — primeiro, não prejudicar."},{numero:4,titulo:"Justiça",icone:"⚖️",cor:"#805ad5",descricao:"Distribuição equitativa dos recursos e tratamento igualitário — sem discriminação de qualquer natureza."}]},{tipo:"destaque",texto:"Em conflito entre princípios: a vida em risco imediato prevalece sobre a autonomia em vítimas com capacidade decisória comprometida (inconsciência, intoxicação, crise psiquiátrica)."}]}},{id:"2.3",titulo:"Direito de recusa de atendimento",conteudo:{tipo:"texto",intro:"O adulto consciente, lúcido e com capacidade de discernimento tem o direito legal e ético de recusar qualquer atendimento médico — inclusive o pré-hospitalar.",blocos:[{tipo:"lista",titulo:"Protocolo de recusa de atendimento:",itens:["1. Confirmar que a vítima está consciente, orientada e capaz de tomar decisões","2. Informar claramente os riscos da recusa, em linguagem acessível","3. Documentar a recusa na ficha de atendimento (identificação, riscos explicados, assinatura se possível)","4. Comunicar imediatamente ao médico regulador","5. Manter presença e diálogo enquanto possível — não abandonar","6. Registrar testemunhas presentes (nome e contato)"]},{tipo:"card-grid",cards:[{titulo:"Quem PODE recusar",subtitulo:"Capacidade decisória presente",texto:"Adulto consciente, orientado, sem alteração do nível de consciência, sem intoxicação ou crise psiquiátrica."},{titulo:"Quem NÃO pode recusar",subtitulo:"Capacidade decisória comprometida",texto:"Inconsciente, intoxicado, em crise psiquiátrica grave, criança/adolescente sem responsável, com Glasgow alterado."},{titulo:"Menor de idade",subtitulo:"Proteção especial — ECA",texto:"Criança ou adolescente NÃO pode recusar. Atendimento obrigatório. Comunicar ao Conselho Tutelar e à regulação médica."},{titulo:"Risco de vida iminente",subtitulo:"Beneficência prevalece",texto:"Em risco de morte imediato, atender mesmo sem consentimento — documentar e comunicar à regulação."}]},{tipo:"destaque",texto:"Atender à força um adulto capaz que recusa é crime de constrangimento ilegal e lesão corporal (CP Art. 146). A documentação correta protege o profissional."}]}},{id:"2.4",titulo:"Sigilo, privacidade e notificações compulsórias",conteudo:{tipo:"texto",intro:"O sigilo profissional no APH protege a dignidade da vítima e é obrigação legal e ética. Porém, certas situações exigem notificação obrigatória ao sistema de vigilância.",blocos:[{tipo:"card-grid",cards:[{titulo:"Sigilo profissional",subtitulo:"Obrigação legal e ética",texto:"Informações da ocorrência são compartilhadas APENAS com a equipe de saúde receptora. Imprensa, curiosos e familiares não autorizados: sem informações."},{titulo:"Notificação compulsória",subtitulo:"Agravos obrigatórios ao SINAN",texto:"Tentativa de autoextermínio, violência doméstica, maus-tratos, violência sexual, doenças infecciosas de notificação. O serviço receptor preenche — APH informa."},{titulo:"Violência doméstica",subtitulo:"Lei Maria da Penha",texto:"Suspeita de violência doméstica deve ser comunicada à regulação médica e registrada na ficha. Não é necessária confirmação para notificar."},{titulo:"Maus-tratos a criança/idoso",subtitulo:"Grupos vulneráveis",texto:"Comunicar ao Conselho Tutelar (criança) ou Ministério Público (idoso). ECA e Estatuto do Idoso preveem proteção especial."}]},{tipo:"destaque",texto:"A notificação compulsória não viola o sigilo — ela é a exceção legalmente prevista. Omitir notificação obrigatória pode gerar responsabilidade legal para o profissional."}]}},{id:"2.5",titulo:"Responsabilidade profissional e documentação",conteudo:{tipo:"texto",intro:"A documentação correta do atendimento protege o profissional, garante continuidade do cuidado e é instrumento legal em caso de questionamento judicial.",blocos:[{tipo:"lista",titulo:"O que deve constar na ficha de atendimento do APH:",itens:["Data, hora de acionamento, chegada à cena, saída e chegada ao hospital","Identificação da vítima (nome, idade, documento se disponível)","Queixa principal e mecanismo de lesão ou natureza da doença","Avaliação clínica: sinais vitais, Glasgow, achados físicos relevantes","Intervenções realizadas (com horário): acesso venoso, medicamentos, imobilização, RCP","Resposta à intervenção e evolução durante o transporte","Destino e nome do profissional receptor no hospital","Em caso de recusa: documentação específica conforme protocolo"]},{tipo:"destaque",texto:"Ficha mal preenchida é equivalente a atendimento mal feito perante a Justiça. 'O que não está escrito, não foi feito' — essa é a lógica jurídica."}]}}]},{id:3,titulo:"As 3 Etapas do Atendimento",icone:"📋",status:"disponivel",topicos:[{id:"3.1",titulo:"Visão geral das 3 etapas",conteudo:{tipo:"texto",intro:"Todo atendimento pré-hospitalar, independente da natureza da ocorrência, é estruturado em três etapas sequenciais e interdependentes: avaliação da cena, avaliação da vítima e intervenção e transporte. Conhecer essa estrutura é o que diferencia um atendimento técnico de uma resposta impulsiva.",blocos:[{tipo:"cadeia",elos:[{numero:1,titulo:"Etapa 1 — Avaliação da Cena",icone:"🔍",cor:"#e53e3e",descricao:"Antes de tocar a vítima: segurança, mecanismo de lesão, número de vítimas, recursos disponíveis."},{numero:2,titulo:"Etapa 2 — Avaliação da Vítima",icone:"🩺",cor:"#dd6b20",descricao:"Avaliação primária (ABCDE), avaliação secundária, anamnese (SAMPLE) e sinais vitais."},{numero:3,titulo:"Etapa 3 — Intervenção e Transporte",icone:"🚑",cor:"#38a169",descricao:"Estabilização, procedimentos necessários, decisão de transporte e comunicação com a regulação."}]},{tipo:"destaque",texto:"As etapas são sequenciais, mas dinâmicas. Problemas identificados devem ser tratados imediatamente antes de avançar para a próxima etapa — exceto quando o transporte urgente é a própria intervenção."},{tipo:"paragrafo",texto:"Este modelo de três etapas está presente em todos os grandes protocolos internacionais de APH: PHTLS (Pre-Hospital Trauma Life Support), ACLS, ITLS e INEM. Independente do sistema adotado, a lógica é sempre: cena → vítima → conduta."}]}},{id:"3.2",titulo:"Etapa 1 — Avaliação da Cena",conteudo:{tipo:"texto",intro:"A avaliação da cena começa antes mesmo de sair da ambulância. Observar o ambiente ainda em movimento já fornece informações valiosas sobre o que aguarda a equipe.",blocos:[{tipo:"lista",titulo:"O que avaliar na Etapa 1:",itens:["Segurança: a cena é segura para minha entrada? Há riscos para mim, para a equipe, para a vítima?","Mecanismo de lesão ou natureza da doença: trauma ou clínico? Alta ou baixa energia?","Número de vítimas: uma vítima, múltiplas ou IMV?","Recursos disponíveis: o que tenho? O que preciso solicitar?","Impressão geral: qual é o estado aparente da vítima antes do contato?"]},{tipo:"card-grid",cards:[{titulo:"Duração ideal",subtitulo:"10 a 30 segundos",texto:"A avaliação da cena deve ser rápida e eficiente. Tempo excessivo nesta etapa atrasa o atendimento da vítima."},{titulo:"EPI obrigatório",subtitulo:"Antes de qualquer aproximação",texto:"Luvas, máscara e óculos são colocados ANTES de chegar à vítima, não durante a avaliação."},{titulo:"Comunicação com a regulação",subtitulo:"Ainda na Etapa 1",texto:"Confirmar chegada, reportar condições da cena e solicitar recursos adicionais se necessário."},{titulo:"Avaliação contínua",subtitulo:"A cena pode mudar",texto:"Reavalie a segurança da cena a cada momento. Incêndio, multidão, clima — tudo pode mudar."}]}]}},{id:"3.3",titulo:"Etapa 2 — Avaliação da Vítima (XABCDE)",conteudo:{tipo:"texto",intro:"A avaliação da vítima no trauma segue o protocolo XABCDE (PHTLS 10ª edição). No paciente clínico, aplica-se o ABCDE convencional. A avaliação é dividida em primária e secundária.",blocos:[{tipo:"card-grid",cards:[{titulo:"Avaliação Primária — TRAUMA",subtitulo:"XABCDE (PHTLS 10ª ed. / ITLS)",texto:"X: hemorragia exsanguinante | A: via aérea + cervical | B: ventilação | C: circulação | D: disfunção neurológica | E: exposição. O X foi inserido para controlar hemorragias fatais ANTES da via aérea."},{titulo:"Avaliação Primária — CLÍNICO",subtitulo:"ABCDE (ACLS / ATLS)",texto:"A: via aérea | B: ventilação | C: circulação | D: disfunção | E: exposição. Sem o X pois hemorragia exsanguinante não é a causa primária em emergências clínicas."},{titulo:"Avaliação Secundária",subtitulo:"Exame céfalo-caudal",texto:"Realizada SOMENTE após estabilização da primária. Busca lesões não identificadas. Inclui SAMPLE completo."},{titulo:"Sinais Vitais",subtitulo:"Parâmetros objetivos",texto:"FC, FR, PA, SpO2, glicemia, temperatura. Aferir ao menos uma vez e monitorar tendência no transporte."}]},{tipo:"destaque",texto:"PHTLS 10ª ed. (2023): o X antes do A é obrigatório no trauma. Hemorragia exsanguinante mata em 3 minutos — mais rápido que obstrução de via aérea."},{tipo:"paragrafo",texto:"Regra prática: vítima instável de trauma = XABCDE + transporte imediato. Não perca tempo na cena. A cirurgia é o tratamento definitivo do politraumatizado grave."}]}},{id:"3.4",titulo:"Etapa 3 — Intervenção e Transporte",conteudo:{tipo:"texto",intro:"A terceira etapa engloba todas as intervenções realizadas no APH e a decisão de transporte. É aqui que se aplica o conceito de 'tratar e ir' versus 'ficar e tratar'.",blocos:[{tipo:"card-grid",cards:[{titulo:"Tratar e ir (Scoop & Run)",subtitulo:"Vítimas instáveis",texto:"Estabilize o essencial na cena (via aérea, hemorragia grave) e transporte imediatamente. Continuação dos cuidados dentro da ambulância."},{titulo:"Ficar e tratar (Stay & Play)",subtitulo:"Vítimas estáveis",texto:"Quando a condição clínica permite, realizar procedimentos completos na cena antes do transporte. Mais comum em emergências clínicas."},{titulo:"Destino correto",subtitulo:"Decisão da regulação médica",texto:"Hospital mais próximo? Hospital de referência? Centro de trauma? A regulação médica define com base no quadro clínico e nos recursos disponíveis."},{titulo:"Comunicação pré-chegada",subtitulo:"Aviso ao serviço receptor",texto:"Informar ao hospital o que está chegando: número de vítimas, quadro clínico, intervenções realizadas, tempo estimado de chegada."}]},{tipo:"lista",titulo:"Procedimentos realizados na Etapa 3:",itens:["Controle de hemorragias (pressão direta, torniquete)","Abertura e manutenção de via aérea","Ventilação assistida com BVM e O2 suplementar","Imobilização de fraturas e coluna","Acesso venoso e reposição volêmica conforme protocolo","Monitorização contínua e reavaliação dos sinais vitais","Registro completo do atendimento"]}]}},{id:"3.5",titulo:"Integração das etapas na prática",conteudo:{tipo:"texto",intro:"Na prática, as três etapas se sobrepõem e se retroalimentam. Um socorrista experiente executa todas elas de forma quase simultânea, com automação e raciocínio clínico paralelo.",blocos:[{tipo:"card-grid",cards:[{titulo:"Cenário 1 — Acidente de trânsito",subtitulo:"Aplicação das 3 etapas",texto:"Etapa 1: cena segura, 2 vítimas, impacto frontal alta energia. Etapa 2: ABCDE revela Glasgow 10 e PA 80x50. Etapa 3: via aérea + acesso venoso + transporte imediato ao trauma center."},{titulo:"Cenário 2 — IAM em domicílio",subtitulo:"Aplicação das 3 etapas",texto:"Etapa 1: cena domiciliar segura, 1 vítima, natureza clínica. Etapa 2: dor precordial, PA 140x90, FC 110. Etapa 3: O2, acesso venoso, ECG, AAS, aviso ao hospital cardiológico."},{titulo:"Cenário 3 — Engasgo em restaurante",subtitulo:"Aplicação das 3 etapas",texto:"Etapa 1: cena pública segura, 1 vítima, natureza clínica. Etapa 2: obstrução total — vítima não consegue falar. Etapa 3: Heimlich imediato. Se PCR: RCP + verificar boca."},{titulo:"Erro mais comum",subtitulo:"Pular etapas",texto:"Ir direto à vítima sem avaliar a cena (risco para o socorrista) ou fazer avaliação secundária completa em vítima instável (perda de tempo crítico)."}]},{tipo:"destaque",texto:"As 3 etapas não são burocracia — são raciocínio clínico organizado. Treinar esta estrutura até que se torne automática é o que define um socorrista competente."}]}}]},{id:4,titulo:"Deslocamento Seguro",icone:"🚒",status:"disponivel",topicos:[{id:"4.1",titulo:"Legislação e responsabilidade no deslocamento",conteudo:{tipo:"texto",intro:"O deslocamento de emergência é regido por leis específicas que conferem prerrogativas à ambulância, mas também estabelecem limites claros de responsabilidade para o condutor e para a equipe.",blocos:[{tipo:"card-grid",cards:[{titulo:"CTB — Art. 29, §2º",subtitulo:"Código de Trânsito Brasileiro",texto:"Veículos de emergência em serviço, com sinais visuais e sonoros acionados, têm prioridade de passagem sobre os demais veículos."},{titulo:"CTB — Art. 38",subtitulo:"Obrigações no cruzamento",texto:"Mesmo com prioridade, o condutor de veículo de emergência deve certificar-se de que os outros veículos cederam passagem antes de cruzar."},{titulo:"Responsabilidade civil e penal",subtitulo:"Acidente durante deslocamento",texto:"Em caso de acidente durante o deslocamento, o condutor responde civil e penalmente. A urgência não exime de responsabilidade."},{titulo:"Portaria MS 2.048/2002",subtitulo:"Padrão de ambulâncias",texto:"Define os equipamentos obrigatórios de sinalização: sirene eletrônica, giroflex e faixas retrorefletivas. Ambulância sem esses equipamentos não tem prerrogativa legal."}]},{tipo:"destaque",texto:"A sirene e o giroflex NÃO dão direito de passar no sinal vermelho sem antes confirmar que todos os veículos pararam. A prioridade é legal — a segurança é obrigatória."}]}},{id:"4.2",titulo:"Técnicas de condução em emergência",conteudo:{tipo:"texto",intro:"Conduzir uma ambulância em emergência exige técnica, atenção e controle emocional. Velocidade alta com controle é diferente de velocidade irresponsável.",blocos:[{tipo:"lista",titulo:"Princípios da condução segura em emergência:",itens:["Usar sirene E giroflex simultaneamente — nunca apenas um dos dois","Reduzir velocidade em cruzamentos, mesmo com sinalização acionada","Manter distância segura do veículo à frente — frenagem da ambulância carregada é diferente do carro vazio","Nunca ultrapassar pelo acostamento em alta velocidade","Em rodovias: usar a faixa da esquerda com sinalização contínua","Comunicar ao parceiro as manobras antes de executá-las","Evitar frenagem brusca — pode piorar o quadro da vítima transportada"]},{tipo:"card-grid",cards:[{titulo:"Cruzamentos",subtitulo:"Ponto crítico do deslocamento",texto:"Diminuir a velocidade, verificar visualmente os dois sentidos, confirmar parada dos veículos e cruzar de forma controlada."},{titulo:"Curvas e lombadas",subtitulo:"Risco de tombamento",texto:"Ambulâncias têm centro de gravidade alto. Curvas em alta velocidade e lombadas sem reduzir são causas frequentes de acidentes."},{titulo:"Chuva e piso molhado",subtitulo:"Reduzir a velocidade",texto:"Distância de frenagem aumenta significativamente. Reduzir velocidade e aumentar distância de segurança."},{titulo:"Comunicação contínua",subtitulo:"Equipe integrada",texto:"Socorrista no banco do passageiro atua como copiloto: observa o trânsito, avisa sobre obstáculos e comunica com a central."}]}]}},{id:"4.3",titulo:"Sinalização e abordagem do local",conteudo:{tipo:"texto",intro:"A forma como a ambulância é posicionada na cena influencia diretamente a segurança da equipe, da vítima e dos outros usuários da via.",blocos:[{tipo:"card-grid",cards:[{titulo:"Posicionamento da ambulância",subtitulo:"Proteção da cena",texto:"Estacionar a ambulância em ângulo (30–45°) em relação à pista, formando uma barreira de proteção entre a equipe e o tráfego."},{titulo:"Distância de segurança",subtitulo:"Em relação ao acidente",texto:"Parar a pelo menos 30 metros do local em acidentes com risco de explosão, derramamento químico ou estrutura instável."},{titulo:"Sinalização da cena",subtitulo:"Triângulo de segurança",texto:"Colocar cones ou triângulos a 30, 60 e 100 metros do ponto de atendimento, na direção do tráfego que se aproxima."},{titulo:"Iluminação",subtitulo:"Atendimentos noturnos",texto:"Manter giroflex e faróis acionados. Usar lanternas pessoais. Nunca trabalhar em rodovia sem colete refletivo."}]},{tipo:"destaque",texto:"Em rodovias de alta velocidade: a ambulância posicionada atrás da cena não protege a equipe. Posicione-a ANTES da cena em relação ao tráfego que se aproxima — criando uma barreira."}]}},{id:"4.4",titulo:"Transporte da vítima",conteudo:{tipo:"texto",intro:"O transporte é a última fase do deslocamento e exige cuidados específicos para não agravar o quadro da vítima durante o trajeto até o hospital.",blocos:[{tipo:"lista",titulo:"Cuidados no transporte:",itens:["Fixar a maca adequadamente antes de iniciar o deslocamento","Manter monitorização contínua dos sinais vitais durante o transporte","Comunicar a regulação médica sobre condições da vítima e tempo estimado de chegada","Avisar o condutor antes de realizar procedimentos que exijam estabilidade do veículo","Evitar frenagens e curvas bruscas — solicitar condução mais suave ao condutor","Registrar horários: saída da cena, chegada ao hospital, transferência da vítima"]},{tipo:"card-grid",cards:[{titulo:"Posição da vítima no transporte",subtitulo:"Depende do quadro clínico",texto:"Decúbito dorsal: padrão. Semi-sentado: dispneia, EAP. Trendelenburg: choque (exceto TCE). Lateral de segurança: inconsciência sem trauma. Ortostática: impossível — nunca transportar sentado sem fixação."},{titulo:"Vítima em PCR no transporte",subtitulo:"RCP em movimento",texto:"Manter compressões durante o transporte. Dispositivosde compressão mecânica (Lucas, AutoPulse) garantem qualidade em movimento."},{titulo:"Velocidade no transporte",subtitulo:"Equilíbrio entre urgência e segurança",texto:"Chegar 2 minutos mais rápido não justifica um acidente com a vítima dentro. Condução firme, mas controlada."},{titulo:"Passagem de caso no hospital",subtitulo:"SBAR oral",texto:"Ao entregar a vítima: identificação, quadro clínico, mecanismo, intervenções realizadas, sinais vitais e evolução durante o transporte."}]}]}},{id:"4.5",titulo:"Estresse no deslocamento e gestão emocional",conteudo:{tipo:"texto",intro:"O deslocamento em emergência é um dos momentos de maior estresse na rotina do socorrista. Controlar o estado emocional é tão importante quanto a técnica de condução.",blocos:[{tipo:"card-grid",cards:[{titulo:"Pressão de tempo",subtitulo:"A urgência real vs. percebida",texto:"Nem todo acionamento é uma corrida contra a morte. Avaliar a gravidade antes de sair em velocidade máxima. Deslocamento desnecessariamente agressivo cria risco sem benefício."},{titulo:"Comunicação na equipe",subtitulo:"Condutor e socorristas",texto:"Equipe bem comunicada evita decisões impulsivas. O socorrista pode e deve orientar o condutor: 'Reduza na curva', 'Confirme o cruzamento'."},{titulo:"Fadiga e plantões longos",subtitulo:"Risco real",texto:"Após 12h ou mais de plantão, tempo de reação aumenta, julgamento piora. Reconhecer o próprio limite é responsabilidade profissional."},{titulo:"Crítica pós-ocorrência",subtitulo:"Aprendizado",texto:"Após cada atendimento com deslocamento crítico: avaliar o que funcionou e o que pode melhorar. Sem julgamento — com foco em segurança futura."}]},{tipo:"destaque",texto:"O socorrista que chega são ao local tem 100% de capacidade para atender. O socorrista que se acidenta no deslocamento tem 0% — e ainda cria uma segunda vítima."}]}}]},{id:5,titulo:"Equipamentos do APH",icone:"🧰",status:"disponivel",topicos:[{id:"5.1",titulo:"Equipamentos de via aérea",conteudo:{tipo:"texto",intro:"Os equipamentos de via aérea são os mais críticos do APH. Conhecer sua indicação, técnica de uso e cuidados é prioridade para qualquer socorrista.",blocos:[{tipo:"card-grid",cards:[{titulo:"Cânula Orofaríngea (Guedel)",subtitulo:"Para que serve",texto:"Impede que a língua obstrua a faringe em vítima inconsciente sem reflexo de gag. Medir do lóbulo da orelha à comissura labial."},{titulo:"Cânula Nasofaríngea",subtitulo:"Para que serve",texto:"Alternativa à Guedel em vítimas semi-conscientes ou com trismo. Contraindicada em fratura de base do crânio."},{titulo:"Bolsa-Valva-Máscara (BVM)",subtitulo:"Para que serve",texto:"Ventilação com pressão positiva. Adulto: 500–600 mL por ventilação, 10–12/min. Requer boa vedação da máscara ao rosto."},{titulo:"Aspirador de secreções",subtitulo:"Para que serve",texto:"Remove sangue, vômito e secreções da via aérea. Usar por no máximo 10 segundos por aspiração para não causar hipóxia."}]},{tipo:"lista",titulo:"Cuidados gerais com equipamentos de via aérea:",itens:["Verificar funcionamento antes de cada plantão","Cânulas em tamanhos variados: neonatal, pediátrico e adulto (P, M, G)","BVM com reservatório e O2 ligado aumenta FiO2 para até 90–100%","Nunca usar Guedel em vítima com reflexo de gag — risco de vômito e broncoaspiração","Laringoscópio: verificar pilhas e lâmpada antes do uso"]}]}},{id:"5.2",titulo:"Equipamentos de oxigenação e monitorização",conteudo:{tipo:"texto",intro:"O oxigênio suplementar e a monitorização dos parâmetros vitais são pilares do atendimento pré-hospitalar. Cada dispositivo tem indicação específica.",blocos:[{tipo:"card-grid",cards:[{titulo:"Cateter Nasal (óculos nasal)",subtitulo:"O2: 2–4 L/min → FiO2 24–36%",texto:"Indicado em hipóxia leve (SpO2 92–95%) e em DPOC (manter SpO2 88–92%). Confortável para vítimas conscientes."},{titulo:"Máscara Facial Simples",subtitulo:"O2: 5–10 L/min → FiO2 35–60%",texto:"Indicada em hipóxia moderada. Mínimo 5 L/min para evitar reinalação de CO2."},{titulo:"Máscara com Reservatório",subtitulo:"O2: 10–15 L/min → FiO2 90–100%",texto:"Máxima concentração de O2 sem via aérea avançada. Indicada em trauma grave, PCR, intoxicação por CO, choque."},{titulo:"Oxímetro de Pulso",subtitulo:"Monitorização de SpO2",texto:"Mede saturação periférica de O2. Normal >95%. Abaixo de 92%: intervenção. Pode ser impreciso em hipoperfusão, anemia grave ou CO."}]},{tipo:"card-grid",cards:[{titulo:"Monitor Cardíaco / DEA",subtitulo:"Monitorização e desfibrilação",texto:"DEA: ritmos chocáveis (FV, TV sem pulso). Monitor: visualização do ritmo em tempo real. Sempre que disponível, monitorar no trauma e PCR."},{titulo:"Glicosímetro",subtitulo:"Glicemia capilar",texto:"Verificar em TODA vítima com alteração de consciência antes de qualquer outra conduta. Normal: 70–110 mg/dL em jejum."},{titulo:"Esfigmomanômetro",subtitulo:"Pressão arterial",texto:"Manual ou automático. Verificar em ambos os braços em suspeita de dissecção aórtica. Manguito correto para o tamanho do braço."},{titulo:"Termômetro",subtitulo:"Temperatura corporal",texto:"Hipotermia (<35°C) e hipertermia (>38,5°C) são emergências. Essencial em afogamento, exposição ao frio e hipertermia maligna."}]}]}},{id:"5.3",titulo:"Equipamentos de imobilização e transporte",conteudo:{tipo:"texto",intro:"A imobilização adequada previne lesões secundárias — especialmente na coluna vertebral e nos membros fraturados. Cada dispositivo tem técnica e indicação específica.",blocos:[{tipo:"card-grid",cards:[{titulo:"Colar Cervical",subtitulo:"Limitação de movimento cervical",texto:"Limita (não imobiliza completamente) movimentos cervicais. Sempre associado à imobilização manual. Tamanhos variados — medir antes de aplicar."},{titulo:"Prancha Longa (Longboard)",subtitulo:"Imobilização de coluna",texto:"Extricação e transporte de vítimas com suspeita de lesão de coluna. Requer mínimo 3 socorristas. Associar head blocks e cintos."},{titulo:"Colete de Extricação (KED)",subtitulo:"Retirada de veículo",texto:"Imobiliza cabeça, pescoço e tronco para retirada de vítima presa em veículo. Aplicado com vítima sentada antes da remoção."},{titulo:"Tala de Tração",subtitulo:"Fraturas de fêmur",texto:"Reduz a dor e o sangramento em fraturas de fêmur pela tração longitudinal. Verificar pulso distal antes e depois da aplicação."}]},{tipo:"card-grid",cards:[{titulo:"Talas de Imobilização",subtitulo:"Fraturas de membros",texto:"Plásticas, moldáveis ou rígidas. Imobilizar a articulação acima e abaixo do foco de fratura. Verificar perfusão distal pré e pós."},{titulo:"Cinto Pélvico",subtitulo:"Fratura de pelve",texto:"Compressão circunferencial da pelve para reduzir sangramento. Posicionar ao nível dos trocânteres maiores. Não aplicar repetidamente."},{titulo:"Maca Articulada (Maca Colher)",subtitulo:"Transporte de vítimas no chão",texto:"Permite levantar vítima do chão sem movimentação da coluna. Separar em dois lados, posicionar e unir sob a vítima."},{titulo:"Cadeira de Rodas / Cadeira de Transporte",subtitulo:"Vítimas que não toleram decúbito",texto:"Para vítimas conscientes com dificuldade respiratória grave (EAP, crise de asma) que não toleram deitar."}]}]}},{id:"5.4",titulo:"Equipamentos de acesso vascular e medicamentos",conteudo:{tipo:"texto",intro:"O acesso vascular permite administração de medicamentos e expansão volêmica no APH. O técnico de enfermagem atua diretamente nessa área sob supervisão.",blocos:[{tipo:"card-grid",cards:[{titulo:"Cateter Intravenoso Periférico",subtitulo:"Acesso venoso periférico",texto:"Calibres 14–18G para adultos em emergências. Preferir veias do antebraço. Em trauma: dois acessos de grosso calibre."},{titulo:"Agulha Intraóssea",subtitulo:"Acesso IO em emergências",texto:"Quando acesso venoso periférico falha em 2 tentativas ou em PCR. Locais: tíbia proximal, úmero proximal. Todos os medicamentos IV podem ser dados IO."},{titulo:"Soro Fisiológico 0,9%",subtitulo:"Expansão volêmica",texto:"Principal fluido de reposição no APH. Em trauma: cuidado com excesso antes do controle da hemorragia — hipotensão permissiva."},{titulo:"Ringer Lactato",subtitulo:"Expansão volêmica em queimados",texto:"Preferido em queimaduras (Fórmula de Parkland). Mais fisiológico que SF para grandes volumes."}]},{tipo:"lista",titulo:"Medicamentos de emergência comuns no APH (conforme protocolo médico):",itens:["Adrenalina (Epinefrina) 1mg/mL: PCR (1mg IV/IO a cada 3-5 min) e anafilaxia (0,3-0,5mg IM)","Glicose 50%: hipoglicemia grave com inconsciência — 20-40mL IV lento","Amiodarona 150mg/3mL: FV/TV refratária após 3º choque — 300mg IV em bólus","Sulfato de Magnésio: Torsades de Pointes e eclâmpsia","Naloxona (Narcan): intoxicação por opioides — 0,4-2mg IV/IM/IN","Midazolam: sedação e controle de convulsões (conforme protocolo médico)"]},{tipo:"destaque",texto:"O técnico de enfermagem administra medicamentos APENAS sob prescrição médica verbal (via rádio/telefone com regulação) ou conforme protocolo institucional aprovado. Nunca por iniciativa própria."}]}},{id:"5.5",titulo:"Manutenção, checagem e cuidados com equipamentos",conteudo:{tipo:"texto",intro:"Equipamento com falha na cena pode custar uma vida. A checagem sistemática antes de cada plantão é responsabilidade de todos os membros da equipe.",blocos:[{tipo:"lista",titulo:"Checklist pré-plantão obrigatório:",itens:["Via aérea: cânulas de todos os tamanhos, BVM testada (sem vazamentos), aspirador funcionando","Oxigênio: cilindro com nível adequado (mínimo 50%), regulador e mangueira sem vazamentos","DEA/Monitor: bateria carregada, pás adesivas dentro do prazo de validade","Imobilização: colar cervical em todos os tamanhos, prancha longa com cintos, KED","Acesso vascular: cateteres de vários calibres, equipo, soro, garrote","Medicamentos: dentro do prazo de validade, quantidade correta conforme protocolo","EPI: luvas, máscaras, óculos — quantidade suficiente para vários atendimentos"]},{tipo:"card-grid",cards:[{titulo:"Higienização de equipamentos",subtitulo:"Após cada atendimento",texto:"Todo equipamento reutilizável deve ser limpo e desinfetado conforme protocolo da instituição. Risco de contaminação cruzada entre pacientes."},{titulo:"Validade de materiais",subtitulo:"Verificação periódica",texto:"Pás do DEA, medicamentos, cateteres e gazes têm prazo de validade. Material vencido deve ser descartado e reposto imediatamente."},{titulo:"Registro de falhas",subtitulo:"Comunicação obrigatória",texto:"Equipamento com falha deve ser comunicado imediatamente ao supervisor e substituído antes do próximo atendimento. Nunca 'deixar para depois'."},{titulo:"Treinamento contínuo",subtitulo:"Familiaridade com os equipamentos",texto:"Equipamento que o socorrista não sabe usar com agilidade é equipamento inútil na emergência. Treinar regularmente em simulações."}]}]}}]},{id:6,titulo:"Tipos de Transporte no APH",icone:"🚒",status:"disponivel",topicos:[{id:"6.1",titulo:"Classificação das ambulâncias — Portaria MS 2.048/2002",conteudo:{tipo:"texto",intro:"No Brasil, as ambulâncias são classificadas em tipos definidos pela Portaria MS 2.048/2002, cada uma com finalidade, equipamento e equipe específicos.",blocos:[{tipo:"card-grid",cards:[{titulo:"Tipo A — Remoção",subtitulo:"Transporte de pacientes estáveis",texto:"Veículo para transporte simples de pacientes sem risco de vida. Sem equipamentos de emergência avançados. Equipe: 2 técnicos de enfermagem ou condutor + técnico."},{titulo:"Tipo B — SBV",subtitulo:"Suporte Básico de Vida",texto:"APH básico e transporte inter-hospitalar de baixo risco. Equipada com O2, DEA, BVM, imobilizadores. Equipe: condutor socorrista + técnico de enfermagem."},{titulo:"Tipo C — Resgate",subtitulo:"Salvamento e resgate",texto:"Veículo para atendimento de urgências de qualquer natureza, salvamento e resgate de vítimas. Pode ser terrestre, aéreo ou aquático. Equipe: bombeiros civis/militares com formação em APH."},{titulo:"Tipo D — UTI Móvel (SAV)",subtitulo:"Suporte Avançado de Vida",texto:"Ambulância de UTI. Equipada com monitor/desfibrilador, ventilador mecânico, bomba de infusão, drogas vasoativas, laringoscópio e IOT. Equipe: médico + enfermeiro + condutor. Usada no SAMU e transporte inter-hospitalar crítico."}]},{tipo:"card-grid",cards:[{titulo:"Tipo E — Aeronave",subtitulo:"Transporte aeromédico",texto:"Helicópteros e aviões medicalizados. Indicados para grandes distâncias, áreas de difícil acesso e vítimas críticas. Equipe especializada."},{titulo:"Tipo F — Embarcação",subtitulo:"Transporte fluvial/marítimo",texto:"Lanças e embarcações medicalizadas. Essenciais na Amazônia, regiões costeiras e em enchentes. Equipe de APH adaptada ao ambiente aquático."},{titulo:"UTI Móvel",subtitulo:"Transporte inter-hospitalar crítico",texto:"Ambulância com recursos de UTI: ventilador mecânico, bombas de infusão, monitor multiparamétrico. Para pacientes críticos entre hospitais."},{titulo:"Moto de Emergência (MotoLATE)",subtitulo:"Chegada rápida",texto:"Motocicleta do socorrista para chegar antes da ambulância, iniciar RCP e usar DEA em PCR enquanto ambulância está a caminho."}]}]}},{id:"6.2",titulo:"Transporte terrestre — técnicas e cuidados",conteudo:{tipo:"texto",intro:"O transporte terrestre é o mais comum no APH brasileiro. A qualidade do transporte depende do posicionamento da vítima, da monitorização e da comunicação.",blocos:[{tipo:"card-grid",cards:[{titulo:"Posição padrão",subtitulo:"Decúbito dorsal",texto:"Maioria das vítimas de trauma e clínicas. Maca horizontal com fixação adequada."},{titulo:"Semi-sentado (Fowler)",subtitulo:"Dispneia, EAP, ICC",texto:"Cabeceira a 45°. Reduz esforço respiratório. Vítimas de AVC (sem hipotensão), EAP, crise de asma grave."},{titulo:"Trendelenburg modificado",subtitulo:"Choque hipovolêmico",texto:"Membros inferiores elevados 30°. Aumenta retorno venoso. Contraindicado em TCE e dificuldade respiratória."},{titulo:"Anti-Trendelenburg",subtitulo:"TCE grave",texto:"Cabeceira elevada a 30°. Reduz pressão intracraniana. Indicado em TCE grave com Glasgow ≤8."}]},{tipo:"lista",titulo:"Cuidados obrigatórios durante o transporte:",itens:["Fixar a maca antes de iniciar o deslocamento","Monitorizar FC, SpO2, FR e PA continuamente ou a cada 5 min em vítimas instáveis","Comunicar ao hospital receptor: quadro clínico, intervenções e tempo estimado","Avisar o condutor antes de realizar procedimentos (acesso venoso, ventilação) que exigem estabilidade","Registrar horários: saída da cena, chegada ao hospital, passagem de caso","Em PCR durante transporte: manter RCP — dispositivos mecânicos garantem qualidade em movimento"]}]}},{id:"6.3",titulo:"Transporte aeromédico",conteudo:{tipo:"texto",intro:"O transporte aeromédico por helicóptero ou aeronave de asa fixa é indicado quando as distâncias ou condições clínicas tornam o transporte terrestre inadequado.",blocos:[{tipo:"card-grid",cards:[{titulo:"Indicações do helicóptero",subtitulo:"Quando acionar",texto:"Distâncias >30 min de ambulância, terrenos inacessíveis, vítima crítica instável, desastres de massa com múltiplas vítimas graves."},{titulo:"Segurança na zona de pouso",subtitulo:"LZ — Landing Zone",texto:"Área de 30x30m limpa, sem obstáculos aéreos, sinalizada com 4 marcadores nas bordas. Vento marcado com fumaça. Afastar pessoas e veículos."},{titulo:"Alterações fisiológicas em altitude",subtitulo:"Efeitos sobre a vítima",texto:"Expansão de gases (pneumotórax piora, bloqueio de ar em cuff de tubos), redução da PaO2, hipotermia acelerada. Monitorização redobrada."},{titulo:"Contraindicações relativas",subtitulo:"Limitações",texto:"Condições meteorológicas adversas (neblina, tempestade), ausência de LZ adequada, combustível insuficiente para o percurso."}]},{tipo:"destaque",texto:"Nunca se aproxime do helicóptero pela cauda (rotor traseiro invisível e mortal). Aproxime-se sempre pela frente, em área visível pelo piloto, agachado, com autorização."}]}},{id:"6.4",titulo:"Transporte fluvial e situações especiais",conteudo:{tipo:"texto",intro:"O Brasil possui dimensões continentais e regiões de difícil acesso onde o transporte fluvial é a única opção viável. Adaptações são necessárias.",blocos:[{tipo:"card-grid",cards:[{titulo:"Região Amazônica",subtitulo:"Realidade brasileira",texto:"Municípios acessíveis apenas por barco. O SAMU fluvial opera com lanchas medicalizadas e equipes treinadas para o ambiente aquático."},{titulo:"Estabilização antes do transporte fluvial",subtitulo:"Mais crítico que terrestre",texto:"Mover para dentro da embarcação exige mais tempo e equipe. Estabilizar ao máximo antes de embarcar — agitação do barco complica procedimentos."},{titulo:"Proteção da vítima",subtitulo:"Variações de temperatura e umidade",texto:"Sol, chuva e vento amplificam hipotermia. Cobrir a vítima, proteger a via aérea e os acessos vasculares da umidade."},{titulo:"Comunicação em áreas remotas",subtitulo:"Rádio e satélite",texto:"Rádio VHF e telefone satélite são essenciais para manter contato com a regulação médica em áreas sem cobertura celular."}]},{tipo:"lista",titulo:"Transporte de grupos especiais:",itens:["Gestante: decúbito lateral esquerdo para evitar compressão da veia cava","Recém-nascido: incubadora aquecida, controle glicêmico e monitorização contínua","Grande queimado: cobrir com campo estéril e manter temperatura do ambiente (hipotermia é fatal)","Vítima de TCE grave: anti-Trendelenburg 30°, evitar agitação e manobras que aumentem pressão intracraniana","Amputação: membro amputado em gaze úmida estéril, saco plástico sobre gelo — nunca em contato direto com gelo"]}]}},{id:"6.5",titulo:"Decisão de destino e regulação médica",conteudo:{tipo:"texto",intro:"O destino correto é tão importante quanto o atendimento na cena. A regulação médica coordena o sistema e define para onde a vítima deve ser transportada.",blocos:[{tipo:"card-grid",cards:[{titulo:"Hospital mais próximo vs. mais adequado",subtitulo:"Decisão crítica",texto:"Nem sempre o mais próximo é o melhor. Trauma grave requer centro de trauma. IAM com supra ST: hospital com hemodinâmica. AVC: hospital com TC e trombólise."},{titulo:"Papel da regulação médica",subtitulo:"Médico regulador decide",texto:"O médico regulador define o destino com base no quadro clínico, recursos do hospital e tempo de deslocamento. A equipe implementa."},{titulo:"Comunicação pré-chegada",subtitulo:"'Código de ativação'",texto:"Informar ao hospital receptor: natureza, número de vítimas, quadro clínico, intervenções e ETA. Hospital se prepara antes da chegada."},{titulo:"Passagem de caso — SBAR",subtitulo:"Handoff ao hospital",texto:"Situação (o que aconteceu), Background (histórico), Avaliação (achados e intervenções), Recomendação (o que o hospital precisa saber)."}]},{tipo:"destaque",texto:"Transportar para o hospital errado pode custar uma vida. Um paciente com AVC que vai para um hospital sem TC perde tempo de trombólise. A regulação médica existe para evitar isso."}]}}]},{id:7,titulo:"Avaliação da Cena",icone:"🔍",status:"disponivel",topicos:[{id:"7.1",titulo:"Segurança da cena",conteudo:{tipo:"texto",intro:"Nenhum atendimento começa sem avaliação de segurança. Socorrista morto ou ferido não salva ninguém. A primeira pergunta ao chegar em qualquer cena é: esta cena é segura para mim atuar?",blocos:[{tipo:"destaque",texto:"REGRA DE OURO: Nunca entre em uma cena insegura. Estabilize primeiro o ambiente, depois a vítima."},{tipo:"lista",titulo:"Riscos mais comuns:",itens:["Acidente de trânsito: combustível, tráfego, instabilidade de veículos","Afogamento: correnteza, profundidade, contaminação","Emergência domiciliar: ambiente hostil, animais, substâncias tóxicas","Violência: agressor no local, armas, multidão","Desastres: estruturas colapsadas, gás, incêndio"]},{tipo:"card-grid",cards:[{titulo:"USE sempre EPI",subtitulo:"Equipamento de Proteção Individual",texto:"Luvas, máscara, óculos e avental são obrigatórios em todo atendimento, sem exceção."},{titulo:"Sinalização da cena",subtitulo:"Proteção do perímetro",texto:"Cones, fitas, viaturas e iluminação protegem equipe e vítima de novos acidentes."},{titulo:"Peça reforço antes",subtitulo:"Não hesite em acionar apoio",texto:"É mais fácil dispensar um recurso em rota do que aguardar quando a situação piora."},{titulo:"Rota de fuga",subtitulo:"Sempre tenha uma saída",texto:"Identifique pelo menos duas rotas de saída antes de se aproximar da vítima."}]}]}},{id:"7.2",titulo:"Cinemática do trauma",conteudo:{tipo:"texto",intro:"Cinemática do trauma é o estudo das forças que atuam sobre o corpo durante um evento traumático. Entender o mecanismo de lesão permite antecipar lesões antes mesmo de examinar a vítima.",blocos:[{tipo:"lista",titulo:"Mecanismos e lesões esperadas:",itens:["Impacto frontal: cervical, esterno, tórax, joelhos","Impacto lateral: bacia, fêmur, costelas do lado impactado","Capotamento: lesões múltiplas e imprevisíveis","Pedestre atropelado: pára-choque, capô, queda no solo (3 fases)","Queda de altura: calcâneos, coluna lombar, punho e crânio","Explosão: barotrauma, lesão penetrante por estilhaços"]},{tipo:"destaque",texto:"Mecanismo de alta energia = presuma lesões graves até que se prove o contrário. Não espere sintomas para imobilizar."}]}},{id:"7.3",titulo:"Número de vítimas e recursos",conteudo:{tipo:"texto",intro:"Antes de se aproximar de qualquer vítima, o socorrista precisa ter visão global da cena: quantas vítimas há, quais os recursos disponíveis e se é necessário acionar apoio.",blocos:[{tipo:"card-grid",cards:[{titulo:"1 a 2 vítimas",subtitulo:"Cena convencional",texto:"Equipe padrão consegue atender. Foco em avaliação individual e transporte adequado."},{titulo:"3 a 5 vítimas",subtitulo:"Cena complexa",texto:"Pode exigir reforço. Iniciar triagem básica e priorizar as mais graves."},{titulo:"Mais de 5 vítimas",subtitulo:"IMV",texto:"Acionar protocolo START imediatamente. Solicitar reforço antes de atendimento individual."},{titulo:"Recursos na cena",subtitulo:"Levantamento obrigatório",texto:"Identifique: bombeiros, SAMU, PM, populares treinados, hospitais, helicóptero."}]},{tipo:"destaque",texto:"Em IMV: fazer o maior bem para o maior número. Isso pode significar não reanimar um paciente em PCR quando há outros sobreviventes sem atendimento."}]}},{id:"7.4",titulo:"Impressão geral da vítima",conteudo:{tipo:"texto",intro:"Ao se aproximar da vítima, os primeiros segundos de observação fornecem informações valiosas antes de qualquer toque. Esta é a impressão geral — avaliação visual rápida e sistemática.",blocos:[{tipo:"lista",titulo:"O que observar:",itens:["Nível de consciência: responde ao chamado? Agitada ou sonolenta?","Posição: deformidades visíveis?","Respiração: movimento torácico? Rápida, lenta ou irregular?","Coloração da pele: pálida, cianótica, ruborizada?","Hemorragias visíveis: sangramento ativo?","Mecanismo aparente: objetos perfurantes, deformidade de membros"]},{tipo:"destaque",texto:"Se a impressão geral indica vítima em risco imediato: chame ajuda, abra via aérea e inicie RCP. Não perca tempo com avaliação secundária."}]}},{id:"7.5",titulo:"Comunicação com a regulação",conteudo:{tipo:"texto",intro:"A comunicação eficiente com a central de regulação médica é parte essencial da avaliação da cena. O médico regulador precisa de informações precisas para tomar decisões.",blocos:[{tipo:"card-grid",cards:[{titulo:"O que informar",subtitulo:"Dados obrigatórios",texto:"Endereço exato, tipo de ocorrência, número de vítimas, condição aparente e recursos no local."},{titulo:"Como falar",subtitulo:"Comunicação objetiva",texto:"Voz calma, frases curtas, confirmação de recebimento. Evite termos vagos sem contexto clínico."},{titulo:"Quando atualizar",subtitulo:"Tempo real",texto:"Sempre que houver mudança no quadro da vítima, novo recurso ou alteração de segurança."},{titulo:"Protocolo SBAR",subtitulo:"Estrutura de comunicação",texto:"Situação → Background → Avaliação → Recomendação. Reduz erros de comunicação."}]},{tipo:"destaque",texto:"Nunca desligue o rádio sem confirmação de recebimento. A regulação médica é sua linha de segurança durante todo o atendimento."}]}}]},{id:8,titulo:"Avaliação da Vítima",icone:"🩺",status:"disponivel",topicos:[{id:"8.1",titulo:"Avaliação primária — XABCDE (Trauma) e ABCDE (Clínico)",conteudo:{tipo:"texto",intro:"A avaliação primária no trauma segue o XABCDE (PHTLS 10ª ed., 2023). No paciente clínico sem hemorragia exsanguinante, aplica-se o ABCDE convencional. Ambos identificam e tratam ameaças imediatas à vida de forma sistemática.",blocos:[{tipo:"destaque",texto:"PHTLS 10ª ed. (2023): no TRAUMA use XABCDE — X controla hemorragia exsanguinante ANTES da via aérea. No paciente CLÍNICO: ABCDE convencional."},{tipo:"cadeia",elos:[{numero:0,titulo:"X — Hemorragia Exsanguinante",icone:"🩸",cor:"#c53030",descricao:"eXsanguinating hemorrhage. Torniquete, tamponamento, gaze hemostática. Controlar ANTES da via aérea. SOMENTE NO TRAUMA."},{numero:0,titulo:"A — Via Aérea",icone:"💨",cor:"#e53e3e",descricao:"Airway com proteção cervical no trauma. Verificar permeabilidade, obstrução e necessidade de dispositivos."},{numero:0,titulo:"B — Ventilação",icone:"🫁",cor:"#dd6b20",descricao:"Breathing. Frequência, profundidade, simetria, SpO2. Tratar pneumotórax hipertensivo e hemotórax maciço."},{numero:0,titulo:"C — Circulação",icone:"❤️",cor:"#d69e2e",descricao:"Circulation. Pulso, PA, perfusão, acesso venoso, reposição volêmica cautelosa."},{numero:0,titulo:"D — Disfunção Neurológica",icone:"🧠",cor:"#38a169",descricao:"Disability. Glasgow, pupilas (tamanho, simetria, reatividade), glicemia capilar, déficit motor."},{numero:0,titulo:"E — Exposição",icone:"👀",cor:"#3182ce",descricao:"Expose. Expor completamente incluindo dorso. Identificar lesões ocultas. Prevenir hipotermia."}]},{tipo:"card-grid",cards:[{titulo:"XABCDE — Trauma",subtitulo:"PHTLS / ITLS / ATLS 10ª ed.",texto:"Sempre que houver suspeita de hemorragia significativa em trauma. X obrigatório antes da via aérea."},{titulo:"ABCDE — Clínico",subtitulo:"ACLS / PALS / BLS",texto:"Emergências clínicas sem hemorragia exsanguinante: IAM, AVC, convulsão, dispneia. Segue A>B>C>D>E."}]}]}},{id:"8.2",titulo:"Escala de Coma de Glasgow",conteudo:{tipo:"texto",intro:"A Escala de Coma de Glasgow (ECGl) é a principal ferramenta para avaliação do nível de consciência no APH. Avalia três componentes independentes.",blocos:[{tipo:"card-grid",cards:[{titulo:"Abertura Ocular (O)",subtitulo:"Máx: 4 pontos",texto:"4: Espontânea | 3: Ao som | 2: À dor | 1: Nenhuma"},{titulo:"Resposta Verbal (V)",subtitulo:"Máx: 5 pontos",texto:"5: Orientada | 4: Confusa | 3: Palavras | 2: Sons | 1: Nenhuma"},{titulo:"Resposta Motora (M)",subtitulo:"Máx: 6 pontos",texto:"6: Obedece | 5: Localiza | 4: Flexão normal | 3: Flexão anormal | 2: Extensão | 1: Nenhuma"},{titulo:"Interpretação",subtitulo:"Pontuação total (3–15)",texto:"15: Normal | 13–14: Leve | 9–12: Moderado | ≤8: Grave (IOT indicada)"}]},{tipo:"destaque",texto:"Glasgow ≤ 8: vítima sem condições de proteger a própria via aérea. Prioridade máxima para suporte ventilatório avançado."}]}},{id:"8.3",titulo:"Sinais vitais",conteudo:{tipo:"texto",intro:"Os sinais vitais são parâmetros objetivos que refletem o estado fisiológico da vítima. No APH, devem ser aferidos rapidamente e repetidos durante o transporte.",blocos:[{tipo:"card-grid",cards:[{titulo:"Frequência Cardíaca",subtitulo:"Normal adulto: 60–100 bpm",texto:"Taquicardia >100: dor, choque, hipóxia. Bradicardia <60: hipóxia grave, intox., lesão medular."},{titulo:"Frequência Respiratória",subtitulo:"Normal adulto: 12–20 irpm",texto:">20: taquipneia (esforço, dor, acidose). <12: bradipneia (depressão do SNC, hipóxia grave)."},{titulo:"Pressão Arterial",subtitulo:"Normal: ~120x80 mmHg",texto:"Hipotensão sistólica <90: sinal de alerta. Em trauma: suspeite hemorragia interna."},{titulo:"SpO2 e Temperatura",subtitulo:"SpO2 normal >95%",texto:"SpO2 <92%: hipóxia com intervenção. Temperatura <35°C: hipotermia — risco no trauma."}]},{tipo:"paragrafo",texto:"No trauma grave, a tendência dos sinais vitais importa mais que um valor isolado. Pressão que cai progressivamente indica piora do quadro mesmo que o primeiro valor seja borderline."}]}},{id:"8.4",titulo:"Anamnese — SAMPLE",conteudo:{tipo:"texto",intro:"A anamnese no APH deve ser rápida e direcionada. O mnemônico SAMPLE organiza as informações essenciais de forma eficiente.",blocos:[{tipo:"lista",titulo:"SAMPLE:",itens:["S — Sinais e Sintomas: o que a vítima sente? Quando começou? Onde é a dor? Escala 0–10.","A — Alergias: a algum medicamento, alimento ou substância?","M — Medicações em uso: nome, dose, horário da última dose.","P — Passado médico: doenças pré-existentes, cirurgias, internações.","L — Última refeição/ingestão: quando comeu ou bebeu pela última vez?","E — Eventos que levaram à situação: o que aconteceu? Como? Há quanto tempo?"]},{tipo:"destaque",texto:"SAMPLE salva vidas: saber que a vítima é diabética, alérgica à penicilina ou usa anticoagulante pode mudar completamente a conduta na cena."}]}},{id:"8.5",titulo:"Avaliação secundária",conteudo:{tipo:"texto",intro:"A avaliação secundária é um exame físico céfalo-caudal sistematizado, realizado APÓS estabilização das prioridades do ABCDE. Busca lesões não identificadas na avaliação primária.",blocos:[{tipo:"lista",titulo:"Sequência da avaliação secundária:",itens:["Cabeça: crânio, face, olhos, nariz, ouvidos, boca — hematomas, lacerações, líquor","Pescoço: desvio de traqueia, distensão jugular, dor à palpação","Tórax: expansibilidade, ausculta, crepitação, feridas abertas","Abdome: rigidez, distensão, dor à palpação, sinais de trauma","Pelve: instabilidade pélvica — palpar uma vez com cautela","Membros: deformidades, pulsos distais, sensibilidade, mobilidade","Dorso: palpação de coluna, lesões posteriores ocultas"]},{tipo:"paragrafo",texto:"A avaliação secundária no APH é orientada pela gravidade. Em vítima instável, o transporte imediato prevalece sobre a avaliação secundária completa na cena."}]}}]},{id:9,titulo:"Suporte Básico de Vida",icone:"❤️",status:"disponivel",topicos:[{id:"9.1",titulo:"Reconhecimento da PCR",conteudo:{tipo:"texto",intro:"A parada cardiorrespiratória (PCR) é a cessação das funções cardíaca e respiratória. O reconhecimento rápido é o primeiro elo da cadeia de sobrevivência.",blocos:[{tipo:"lista",titulo:"Como reconhecer a PCR:",itens:["Vítima irresponsiva: não responde à voz nem ao toque","Ausência de respiração normal: sem movimentos torácicos ou gasping (respiração agônica)","Ausência de pulso carotídeo (verificação por até 10 segundos — não retarde o início da RCP)","Pele pálida, cianótica ou acinzentada"]},{tipo:"destaque",texto:"Gasping (respiração agônica) NÃO é respiração normal. Se a vítima estiver inconsciente com gasping: iniciar RCP imediatamente."},{tipo:"card-grid",cards:[{titulo:"Ritmos chocáveis",subtitulo:"FV e TV sem pulso",texto:"Fibrilação Ventricular e Taquicardia Ventricular sem pulso. DEA indicado."},{titulo:"Ritmos não chocáveis",subtitulo:"Assistolia e AESP",texto:"Assistolia (linha reta) e Atividade Elétrica Sem Pulso. Apenas RCP + causa reversível."},{titulo:"Causas reversíveis — 5H",subtitulo:"Hipóxia, Hipo/hipercalemia, H+, Hipotermia, Hipovolemia",texto:"Identificar e tratar a causa é parte essencial da ressuscitação."},{titulo:"Causas reversíveis — 5T",subtitulo:"Tamponamento, Tensão (PTX), Trombose (IAM/TEP), Tóxicos, Trauma",texto:"Tratar a causa aumenta a chance de reversão da PCR."}]}]}},{id:"9.2",titulo:"Compressões torácicas",conteudo:{tipo:"texto",intro:"As compressões torácicas são o elemento mais importante da RCP. Uma compressão de qualidade mantém a perfusão coronariana e cerebral durante a PCR.",blocos:[{tipo:"card-grid",cards:[{titulo:"Posição das mãos",subtitulo:"Técnica correta",texto:"Calcanhares das mãos no centro do tórax (metade inferior do esterno). Dedos entrelaçados, braços estendidos."},{titulo:"Profundidade",subtitulo:"Pelo menos 5 cm (máx 6 cm)",texto:"Compressões rasas são ineficazes. Profundas demais aumentam risco de lesão."},{titulo:"Frequência",subtitulo:"100 a 120 compressões/min",texto:"Use o ritmo de 'Stayin' Alive' dos Bee Gees como referência (103 bpm)."},{titulo:"Retorno completo",subtitulo:"Essencial entre compressões",texto:"Não apoiar o peso no tórax entre compressões. O retorno permite o enchimento cardíaco."}]},{tipo:"destaque",texto:"Minimize interrupções. Cada pausa nas compressões reduz a perfusão coronariana. Troque o compressor a cada 2 minutos para manter qualidade."}]}},{id:"9.3",titulo:"Ventilação e relação C:V",conteudo:{tipo:"texto",intro:"A ventilação complementa as compressões na RCP. A relação correta entre compressões e ventilações varia conforme a presença de via aérea avançada.",blocos:[{tipo:"card-grid",cards:[{titulo:"Sem via aérea avançada",subtitulo:"Adulto",texto:"30 compressões : 2 ventilações. Pausar as compressões para ventilar."},{titulo:"Com via aérea avançada",subtitulo:"IOT ou supraglótica",texto:"1 ventilação a cada 6 segundos (10/min), de forma assíncrona às compressões contínuas."},{titulo:"Ventilação BVM",subtitulo:"Bolsa-Valva-Máscara",texto:"Volume suficiente para elevar o tórax (500–600 mL). Evite hiperventilar — aumenta pressão intratorácica."},{titulo:"Crianças",subtitulo:"Pediátrico",texto:"Lactentes: 2 dedos no centro do tórax. Criança: 1 ou 2 mãos. Profundidade: 1/3 do diâmetro AP."}]},{tipo:"paragrafo",texto:"Se não houver equipamento de ventilação e o socorrista não estiver treinado para ventilação boca a boca, a RCP apenas com compressões (hands-only) é aceitável em adultos até chegada do DEA."}]}},{id:"9.4",titulo:"Uso do DEA",conteudo:{tipo:"texto",intro:"O Desfibrilador Externo Automático (DEA) é um equipamento seguro, de fácil uso e que salva vidas. Qualquer pessoa treinada pode operá-lo.",blocos:[{tipo:"lista",titulo:"Sequência de uso do DEA:",itens:["1. Ligar o DEA assim que disponível — não interrompa as compressões para buscá-lo","2. Posicionar as pás: uma abaixo da clavícula direita, outra na linha axilar esquerda","3. Afastar todos: 'Ninguém toca na vítima!'","4. Aguardar análise do ritmo pelo DEA","5. Se indicado: aplicar o choque ao apertar o botão","6. Reiniciar compressões IMEDIATAMENTE após o choque (não espere verificar pulso)","7. Repetir a cada 2 minutos até chegada do SAV ou retorno da circulação"]},{tipo:"destaque",texto:"Em crianças: usar pás pediátricas ou modo pediátrico se disponível. Na ausência, usar pás adultas com posicionamento anterior-posterior."}]}},{id:"9.5",titulo:"Situações especiais de RCP",conteudo:{tipo:"texto",intro:"Algumas situações exigem adaptações na técnica de RCP ou decisões específicas no APH.",blocos:[{tipo:"card-grid",cards:[{titulo:"Gestante",subtitulo:"Adaptação obrigatória",texto:"Deslocar o útero manualmente para a esquerda ou inclinação da prancha 15–30° para aliviar compressão da veia cava."},{titulo:"Hipotermia",subtitulo:"Não parar precocemente",texto:"'Não está morto até estar quente e morto.' RCP contínua até reaquecimento, exceto lesões incompatíveis com vida."},{titulo:"Afogamento",subtitulo:"5 ventilações iniciais",texto:"Iniciar com 5 ventilações de resgate antes das compressões, pois hipóxia é a causa primária."},{titulo:"Quando não iniciar RCP",subtitulo:"Decisão médica e legal",texto:"Sinais de morte biológica: rigidez, livores, decapitação, carbonização. Decisão comunicada à regulação."}]},{tipo:"paragrafo",texto:"O retorno da circulação espontânea (RCE) é reconhecido por: pulso palpável, respiração espontânea, movimentação voluntária e recuperação da consciência."}]}}]},{id:10,titulo:"Atualização AHA 2025",icone:"📡",status:"disponivel",topicos:[{id:"10.1",titulo:"O que mudou com a AHA 2025",conteudo:{tipo:"texto",intro:"As diretrizes AHA (American Heart Association) são revisadas a cada 5 anos com base em evidências científicas. As atualizações de 2020 e 2025 trouxeram mudanças importantes que todo socorrista precisa conhecer.",blocos:[{tipo:"destaque",texto:"As diretrizes AHA 2025 mantêm o foco em: compressões de ALTA QUALIDADE, minimização de pausas, desfibrilação precoce e cuidados pós-PCR estruturados."},{tipo:"card-grid",cards:[{titulo:"Compressões de alta qualidade",subtitulo:"O mais importante",texto:"Frequência 100–120/min, profundidade ≥5cm (máx 6cm), retorno completo do tórax, mínimo de pausas (<10 seg). Sem mudança — reforço."},{titulo:"Relação C:V sem via aérea avançada",subtitulo:"Mantida: 30:2",texto:"Adultos e crianças com 2 socorristas: 30:2. Com via aérea avançada: compressões contínuas + 1 ventilação a cada 6 segundos."},{titulo:"Tempo
